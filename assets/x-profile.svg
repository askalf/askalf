<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="200" fill="url(#bg)"/>
  <rect width="400" height="400" rx="200" fill="url(#glow)"/>

  <!-- Infinity / figure-8 symbol -->
  <g transform="translate(200,180)">
    <ellipse cx="-38" cy="0" rx="42" ry="50" fill="none" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="38" cy="0" rx="42" ry="50" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="7" fill="#c4b5fd"/>
  </g>

  <!-- Brand text below symbol -->
  <text x="200" y="290" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="36" font-weight="800" letter-spacing="-1" fill="#a78bfa">orcastr8r</text>

  <!-- Subtle ring border -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#27272a" stroke-width="1.5"/>
</svg>

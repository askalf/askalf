# AskAlf Self-Hosted Redis Configuration
# Tuned for 640M container, pubsub + BullMQ + session store

# ===========================================
# NETWORK
# ===========================================
bind 0.0.0.0
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 300

# ===========================================
# SECURITY
# ===========================================
protected-mode yes

# ===========================================
# MEMORY MANAGEMENT
# ===========================================
maxmemory 512mb
maxmemory-policy noeviction
maxmemory-samples 10

# ===========================================
# PERSISTENCE — AOF (tuned for lower write pressure)
# ===========================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ===========================================
# RDB SNAPSHOTS (less frequent — AOF is primary)
# ===========================================
save 3600 1
save 900 100
save 300 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# ===========================================
# PERFORMANCE
# ===========================================
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes

# IO threads (faster for multi-key operations)
io-threads 2
io-threads-do-reads yes

slowlog-log-slower-than 10000
slowlog-max-len 128

# Buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 64mb 16mb 120

# Active defragmentation (reduce fragmentation ratio)
activedefrag yes
active-defrag-enabled yes
active-defrag-ignore-bytes 64mb
active-defrag-threshold-lower 5
active-defrag-threshold-upper 50
active-defrag-cycle-min 1
active-defrag-cycle-max 15

# ===========================================
# LOGGING
# ===========================================
loglevel notice

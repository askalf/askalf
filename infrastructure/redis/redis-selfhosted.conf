# AskAlf Self-Hosted Redis Configuration

# ===========================================
# NETWORK
# ===========================================
bind 0.0.0.0
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 300

# ===========================================
# SECURITY
# ===========================================
protected-mode yes
# Password set via --requirepass command line arg

# ===========================================
# MEMORY MANAGEMENT
# ===========================================
maxmemory 200mb
# CRITICAL: Use noeviction for BullMQ job queues
# LRU eviction can delete queue keys and cause lost/stuck jobs
maxmemory-policy noeviction
maxmemory-samples 10

# ===========================================
# PERSISTENCE (AOF)
# ===========================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ===========================================
# RDB SNAPSHOTS (backup)
# ===========================================
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# ===========================================
# PERFORMANCE
# ===========================================
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

slowlog-log-slower-than 10000
slowlog-max-len 128

client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ===========================================
# LOGGING
# ===========================================
loglevel notice

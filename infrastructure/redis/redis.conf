# SUBSTRATE Redis Configuration - Hardened for Production

# ===========================================
# NETWORK
# ===========================================
bind 0.0.0.0
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 300

# ===========================================
# SECURITY
# ===========================================
# Password set via command line (--requirepass)
protected-mode yes

# Disable dangerous commands by renaming to empty string
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command KEYS ""
rename-command CONFIG ""
rename-command SHUTDOWN SUBSTRATE_SHUTDOWN
rename-command SLAVEOF ""
rename-command REPLICAOF ""
rename-command BGREWRITEAOF SUBSTRATE_BGREWRITEAOF
rename-command BGSAVE SUBSTRATE_BGSAVE
rename-command SAVE SUBSTRATE_SAVE

# ===========================================
# MEMORY MANAGEMENT
# ===========================================
# Memory limit with headroom for BullMQ (container limit is 768M)
maxmemory 640mb

# CRITICAL: Use noeviction for BullMQ job queues
# LRU eviction can delete queue keys and cause lost/stuck jobs
# If memory is exhausted, Redis will return errors on writes
# Monitor memory usage and scale up if needed
maxmemory-policy noeviction

maxmemory-samples 10

# ===========================================
# PERSISTENCE (AOF)
# ===========================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ===========================================
# RDB SNAPSHOTS (backup)
# ===========================================
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# ===========================================
# PERFORMANCE
# ===========================================
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Slow log (queries taking more than 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ===========================================
# LOGGING
# ===========================================
loglevel notice

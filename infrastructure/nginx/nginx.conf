# SUBSTRATE Production Nginx Configuration
# SECURITY: This nginx is NOT publicly exposed - only accessible via cloudflared tunnel
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===========================================
    # CLOUDFLARE SECURITY
    # ===========================================
    # Restore real client IP from Cloudflare headers
    # cloudflared connects from Docker network, but passes real IP in CF-Connecting-IP
    set_real_ip_from 172.16.0.0/12;  # Docker networks
    set_real_ip_from 10.0.0.0/8;     # Docker networks
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Map to detect if request came through Cloudflare
    # Requests without CF-Connecting-IP are rejected (except health checks)
    map $http_cf_connecting_ip $is_cloudflare {
        default 1;
        "" 0;
    }

    # Logging format with real client IP
    log_format main '$http_cf_connecting_ip - $remote_user [$time_local] "$host" "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cf_ray=$http_cf_ray '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;

    # Hide backend framework headers
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript
               image/svg+xml;

    # Rate limiting (loosened for development - production should tighten)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=60r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Cloudflare-aware rate limit — uses real user IP behind CF tunnel
    map $http_cf_connecting_ip $cf_real_ip {
        default $http_cf_connecting_ip;
        ""      $binary_remote_addr;
    }
    limit_req_zone $cf_real_ip zone=search_limit:10m rate=30r/m;

    # Docker DNS resolver - re-resolve on container restart
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Cache configuration
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # API response microcache (short-lived for read endpoints)
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=5m use_temp_path=off;

    # Include site configurations
    include /etc/nginx/conf.d/*.conf;
}

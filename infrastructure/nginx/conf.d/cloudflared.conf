# Dashboard (app.askalf.org)
server {
    listen 80;
    server_name app.askalf.org;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss://app.askalf.org; frame-ancestors 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    limit_conn conn_limit 50;

    # Health check
    location /health {
        access_log off;
        set $dashboard_backend "dashboard:3001";
        proxy_pass http://$dashboard_backend/health;
    }

    # WebSocket support for real-time updates
    location /ws {
        set $dashboard_backend "dashboard:3001";
        proxy_pass http://$dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        set $dashboard_backend "dashboard:3001";
        proxy_pass http://$dashboard_backend;
        proxy_cache static_cache;
        proxy_cache_valid 200 1d;
        expires 1d;
    }

    # Self API → route to Self service
    location /api/v1/self/ {
        limit_req zone=api_limit burst=30 nodelay;
        set $self_backend "self:3006";
        proxy_pass http://$self_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
        # SSE support for streaming chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Admin API → route to Dashboard server (admin-hub + assistant)
    location /api/v1/admin/ {
        limit_req zone=api_limit burst=30 nodelay;
        set $dashboard_backend "dashboard:3001";
        proxy_pass http://$dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # API endpoints → route to Forge (single backend)
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        set $forge_backend "forge:3005";
        proxy_pass http://$forge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
    }

    # Main content
    location / {
        set $dashboard_backend "dashboard:3001";
        proxy_pass http://$dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
    }
}

# Agent Forge (forge.askalf.org) - AI Agent Creation Platform
server {
    listen 80;
    server_name forge.askalf.org;

    add_header X-Content-Type-Options "nosniff" always;

    limit_conn conn_limit 100;

    # Health check
    location /health {
        access_log off;
        set $forge_backend "forge:3005";
        proxy_pass http://$forge_backend/health;
    }

    # SSE streaming endpoint - needs special handling for long-lived connections
    location ~ ^/api/v1/forge/executions/.+/stream$ {
        set $forge_backend "forge:3005";
        proxy_pass http://$forge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        # SSE-specific settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # API endpoints (rate limited)
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        set $forge_backend "forge:3005";
        proxy_pass http://$forge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

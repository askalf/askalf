# API Server (api.askalf.org)
server {
    listen 80;
    server_name api.askalf.org;

    add_header X-Content-Type-Options "nosniff" always;

    # Connection and rate limits
    limit_conn conn_limit 100;

    # Health check (no rate limit)
    location /health {
        access_log off;
        set $api_backend "forge:3005";
        proxy_pass http://$api_backend/health;
    }

    # Metrics endpoint (internal only - blocked from public)
    location /metrics {
        # Only allow internal Docker network access
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        set $api_backend "forge:3005";
        proxy_pass http://$api_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Auth endpoints (rate limited to prevent brute force)
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password|logout|me) {
        limit_req zone=auth_limit burst=100 nodelay;
        set $api_backend "forge:3005";
        proxy_pass http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # Stripe webhook (needs raw body, no rate limit)
    location /api/v1/stripe/webhook {
        set $api_backend "forge:3005";
        proxy_pass http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Cacheable read-only endpoints (GET requests only)
    location ~ ^/api/v1/(shards|facts)$ {
        limit_req zone=api_limit burst=50 nodelay;

        # Only cache GET requests
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 10s;
        proxy_cache_key "$request_method$request_uri$http_authorization";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;

        set $api_backend "forge:3005";
        proxy_pass http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # API endpoints (rate limited)
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        set $api_backend "forge:3005";
        proxy_pass http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Default - proxy to API
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        set $api_backend "forge:3005";
        proxy_pass http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}


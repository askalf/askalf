# SUBSTRATE Nginx Configuration for Cloudflare Tunnel
# SECURITY: This nginx is ONLY accessible via cloudflared tunnel (no public ports)
# Cloudflare handles SSL termination, so we only need HTTP internally

# ===========================================
# Upstream backends with keepalive connections
# ===========================================
upstream forge_backend {
    server forge:3005;
    keepalive 16;
}

upstream dashboard_backend {
    server dashboard:3001;
    keepalive 16;
}

upstream self_backend {
    server self:3006;
    keepalive 8;
}

upstream askalf_backend {
    server askalf:3007;
    keepalive 8;
}

upstream just_push_backend {
    server just-push:3008;
    keepalive 8;
}

upstream searxng_backend {
    server searxng:8080;
    keepalive 8;
}

# ===========================================
# DEFAULT SERVER - Reject non-Cloudflare requests
# ===========================================
server {
    listen 80 default_server;
    server_name _;

    # Health check for Docker (no CF header required)
    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Reject everything else that doesn't come through Cloudflare
    location / {
        # Check for Cloudflare header
        if ($http_cf_connecting_ip = "") {
            return 403 '{"error": "Direct access forbidden. Use Cloudflare tunnel."}';
        }
        return 404 '{"error": "Unknown host"}';
    }
}

# Amnesia.tax - Internal Search Engine (SearXNG frontend)
server {
    listen 80;
    server_name amnesia.tax www.amnesia.tax;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none';" always;

    # Connection limit
    limit_conn conn_limit 20;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Proxy search API to SearXNG (rate limited + cached)
    location /search {
        limit_req zone=search_limit burst=10 nodelay;

        # Cache identical queries for 60s
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 502 503 504 5s;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://searxng_backend/search$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;

        # Compress JSON responses
        gzip on;
        gzip_types application/json;
        gzip_min_length 256;

        # Strip SearXNG internal headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Serve OG image
    location /og.png {
        root /usr/share/nginx/static;
        try_files /amnesia-og.png =404;
        add_header Content-Type "image/png" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Block direct access to SearXNG UI/settings/preferences
    location ~ ^/(settings|preferences|stats|config|info|autocompleter) {
        return 404;
    }

    # Cache the Google Font
    location /css2 {
        proxy_pass https://fonts.googleapis.com;
        proxy_cache static_cache;
        proxy_cache_valid 200 7d;
        expires 7d;
    }

    # Serve search frontend
    location / {
        root /usr/share/nginx/static;
        try_files /amnesia-search.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }
}

# Integration Tax (integration.tax)
server {
    listen 80;
    server_name integration.tax www.integration.tax *.integration.tax;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;

    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location / {
        root /usr/share/nginx/static;
        try_files /integration-hold.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }
}

# Main Website (askalf.org) - On Hold
server {
    listen 80;
    server_name askalf.org www.askalf.org;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;

    # Health check (for monitoring)
    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Serve static holding page
    location / {
        root /usr/share/nginx/static;
        try_files /askalf-hold.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }
}

# Dashboard (app.askalf.org)
server {
    listen 80;
    server_name app.askalf.org;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss://app.askalf.org; frame-ancestors 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    limit_conn conn_limit 50;

    # Health check
    location /health {
        access_log off;
        proxy_pass http://dashboard_backend/health;
    }

    # WebSocket support for real-time updates
    location /ws {
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache static_cache;
        proxy_cache_valid 200 1d;
        expires 1d;
    }

    # Self API → route to Self service
    location /api/v1/self/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://self_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
        # SSE support for streaming chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Ask Alf API → route to Ask Alf service
    location /api/v1/askalf/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://askalf_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
        # SSE support for streaming chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Admin API → route to Dashboard server (admin-hub + assistant)
    location /api/v1/admin/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # API endpoints → route to Forge (single backend)
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://forge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
    }

    # Just Push → route to Just Push service (^~ prevents static file regex from intercepting)
    # Override security headers here because location-level add_header replaces server-level
    location ^~ /push/ {
        rewrite ^/push(/.*)$ $1 break;
        proxy_pass http://just_push_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";

        # Security headers (must redeclare here since location add_header overrides server block)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    }

    # Main content
    location / {
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";
    }
}

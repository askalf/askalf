# SUBSTRATE Nginx Configuration for Cloudflare Tunnel
# SECURITY: This nginx is ONLY accessible via cloudflared tunnel (no public ports)
# Cloudflare handles SSL termination, so we only need HTTP internally

# ===========================================
# DEFAULT SERVER - Reject non-Cloudflare requests
# ===========================================
server {
    listen 80 default_server;
    server_name _;

    # Health check for Docker (no CF header required)
    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Reject everything else that doesn't come through Cloudflare
    location / {
        # Check for Cloudflare header
        if ($http_cf_connecting_ip = "") {
            return 403 '{"error": "Direct access forbidden. Use Cloudflare tunnel."}';
        }
        return 404 '{"error": "Unknown host"}';
    }
}

# Amnesia.tax - Internal Search Engine (SearXNG frontend)
server {
    listen 80;
    server_name amnesia.tax www.amnesia.tax;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none';" always;

    # Connection limit
    limit_conn conn_limit 20;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Proxy search API to SearXNG (rate limited + cached)
    location /search {
        limit_req zone=api_limit burst=20 nodelay;

        # Cache identical queries for 60s
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 502 503 504 5s;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;

        set $searxng_backend "searxng:8080";
        proxy_pass http://$searxng_backend/search$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;

        # Compress JSON responses
        gzip on;
        gzip_types application/json;
        gzip_min_length 256;

        # Strip SearXNG internal headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Block direct access to SearXNG UI/settings/preferences
    location ~ ^/(settings|preferences|stats|config|info|autocompleter) {
        return 404;
    }

    # Cache the Google Font
    location /css2 {
        proxy_pass https://fonts.googleapis.com;
        proxy_cache static_cache;
        proxy_cache_valid 200 7d;
        expires 7d;
    }

    # Serve search frontend
    location / {
        root /usr/share/nginx/static;
        try_files /amnesia-search.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }
}


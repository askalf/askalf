# Webhost Sites Configuration
# Used with docker-compose.webhost.yml — serves public-facing sites
# amnesia.tax (search), askalf.org (landing), redirects for old domains

# ===========================================
# DEFAULT SERVER - Reject non-Cloudflare requests
# ===========================================
server {
    listen 80 default_server;
    server_name _;

    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location / {
        if ($http_cf_connecting_ip = "") {
            return 403 '{"error": "Direct access forbidden. Use Cloudflare tunnel."}';
        }
        return 404 '{"error": "Unknown host"}';
    }
}

# ===========================================
# amnesia.tax - Search Engine (SearXNG frontend)
# ===========================================
server {
    listen 80;
    server_name amnesia.tax www.amnesia.tax;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self'; frame-ancestors 'none';" always;

    limit_conn conn_limit 20;

    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location = /robots.txt {
        root /usr/share/nginx/static;
        try_files /robots-amnesia.txt =404;
        add_header Content-Type "text/plain" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        root /usr/share/nginx/static;
        try_files /sitemap-amnesia.xml =404;
        add_header Content-Type "application/xml" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Proxy search API to SearXNG
    location /search {
        limit_req zone=search_limit burst=10 nodelay;

        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 502 503 504 5s;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;

        set $searxng_backend "searxng:8080";
        proxy_pass http://$searxng_backend/search$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location /og.png {
        root /usr/share/nginx/static;
        try_files /amnesia-og.png =404;
        add_header Content-Type "image/png" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /opensearch.xml {
        root /usr/share/nginx/static;
        try_files /opensearch.xml =404;
        add_header Content-Type "application/opensearchdescription+xml" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /autocompleter {
        limit_req zone=search_limit burst=5 nodelay;
        set $searxng_backend "searxng:8080";
        proxy_pass http://$searxng_backend/autocompleter$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Block SearXNG internals
    location ~ ^/(settings|preferences|stats|config|info) {
        return 404;
    }

    # Cache Google Fonts
    location /css2 {
        proxy_pass https://fonts.googleapis.com;
        proxy_cache static_cache;
        proxy_cache_valid 200 7d;
        expires 7d;
    }

    # Serve search frontend
    location / {
        root /usr/share/nginx/static;
        try_files /amnesia-search.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }
}

# ===========================================
# askalf.org - Static Landing Page
# ===========================================

# Redirect www and old domain
server {
    listen 80;
    server_name www.askalf.org;
    return 301 https://askalf.org$request_uri;
}

server {
    listen 80;
    server_name orcastr8r.com www.orcastr8r.com;
    return 301 https://askalf.org$request_uri;
}

server {
    listen 80;
    server_name askalf.org;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src https://fonts.gstatic.com https://cdn.fontshare.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    limit_conn conn_limit 50;

    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location = /robots.txt {
        root /usr/share/nginx/static;
        try_files /robots-askalf.txt =404;
        add_header Content-Type "text/plain" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        root /usr/share/nginx/static;
        try_files /sitemap-askalf.xml =404;
        add_header Content-Type "application/xml" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Block common bot probes
    location ~ ^/(wp-admin|wp-login\.php|wp-content|wp-includes|wordpress|xmlrpc\.php) {
        access_log off;
        return 404;
    }

    # Docs
    location = /docs {
        root /usr/share/nginx/static;
        try_files /askalf-docs.html =404;
        add_header Content-Type "text/html" always;
    }

    # Privacy
    location = /privacy {
        root /usr/share/nginx/static;
        try_files /askalf-privacy.html =404;
        add_header Content-Type "text/html" always;
    }

    # Terms
    location = /terms {
        root /usr/share/nginx/static;
        try_files /askalf-terms.html =404;
        add_header Content-Type "text/html" always;
    }

    # Favicon
    location = /favicon.svg {
        root /usr/share/nginx/static;
        try_files /favicon.svg =404;
        add_header Content-Type "image/svg+xml" always;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Terminal screenshots
    location = /term-claude.png {
        root /usr/share/nginx/static;
        add_header Content-Type "image/png" always;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /term-codex.png {
        root /usr/share/nginx/static;
        add_header Content-Type "image/png" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # OG image
    location = /askalf-og.png {
        root /usr/share/nginx/static;
        try_files /askalf-og.png =404;
        add_header Content-Type "image/png" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Public Intent Parser — landing page demo
    location = /api/v1/public/intent {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }
        set $forge "forge:3005";
        proxy_pass http://$forge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 10s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # Serve static landing page (exact root only)
    location = / {
        root /usr/share/nginx/static;
        try_files /askalf-landing.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }

    # Security comparison page
    location = /security {
        root /usr/share/nginx/static;
        try_files /askalf-security.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache" always;
    }

    # 404 for everything else
    location / {
        return 404 '<!DOCTYPE html><html><head><title>404 — AskAlf</title><style>body{background:#030308;color:#f0f0f2;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}div{text-align:center}h1{font-size:4rem;font-weight:900;color:#7c3aed;margin:0}p{color:rgba(255,255,255,.5);margin:16px 0}a{color:#a78bfa}</style></head><body><div><h1>404</h1><p>Page not found.</p><a href="https://askalf.org">Back to AskAlf</a></div></body></html>';
        add_header Content-Type "text/html; charset=utf-8" always;
    }
}

# Redirect integration.tax → amnesia.tax
server {
    listen 80;
    server_name integration.tax www.integration.tax;
    return 301 https://amnesia.tax$request_uri;
}

# ===========================================
# get.askalf.org — Installer script endpoint
# ===========================================
server {
    listen 80;
    server_name get.askalf.org;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        root /usr/share/nginx/static;
        try_files /install.sh =404;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Content-Disposition "inline" always;
        add_header Cache-Control "public, max-age=300" always;
    }
}

# Catch-all redirect for askalf.org subdomains
server {
    listen 80;
    server_name *.askalf.org;
    return 301 https://askalf.org$request_uri;
}

# SUBSTRATE Default Server Configuration

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow health checks over HTTP
    location /nginx-health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================================
# ASKALF.ORG — RETIRED, redirect to amnesia.tax
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name askalf.org www.askalf.org api.askalf.org app.askalf.org *.askalf.org;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://amnesia.tax;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04040a"/>
      <stop offset="50%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#04040a"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Nebula glows -->
  <circle cx="900" cy="280" r="280" fill="#7c3aed" opacity="0.03"/>
  <circle cx="350" cy="350" r="200" fill="#22d3ee" opacity="0.02"/>

  <!-- Orbital fleet (right side) -->
  <g transform="translate(920, 300)">
    <!-- Orbital rings -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.12"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.08"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.06"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="28" fill="url(#purple)" opacity="0.9"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
    <text x="0" y="7" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="20" fill="#fff">7</text>

    <!-- Agent nodes -->
    <circle cx="0" cy="-120" r="8" fill="#60a5fa" opacity="0.8"/>
    <circle cx="104" cy="-60" r="7" fill="#a78bfa" opacity="0.8"/>
    <circle cx="104" cy="60" r="8" fill="#34d399" opacity="0.8"/>
    <circle cx="0" cy="120" r="7" fill="#fb923c" opacity="0.8"/>
    <circle cx="-104" cy="60" r="8" fill="#f87171" opacity="0.8"/>
    <circle cx="-104" cy="-60" r="7" fill="#2dd4bf" opacity="0.8"/>
    <circle cx="60" cy="-145" r="6" fill="#e879f9" opacity="0.8"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#60a5fa" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="0" x2="104" y2="-60" stroke="#a78bfa" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="0" x2="104" y2="60" stroke="#34d399" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="#fb923c" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="0" x2="-104" y2="60" stroke="#f87171" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="0" x2="-104" y2="-60" stroke="#2dd4bf" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="0" x2="60" y2="-145" stroke="#e879f9" stroke-width="0.5" opacity="0.15"/>

    <!-- Coronas -->
    <circle cx="0" cy="-120" r="16" fill="#60a5fa" opacity="0.06"/>
    <circle cx="104" cy="60" r="16" fill="#34d399" opacity="0.06"/>
    <circle cx="-104" cy="60" r="16" fill="#f87171" opacity="0.06"/>
  </g>

  <!-- Brand -->
  <text x="80" y="105" font-family="monospace, system-ui" font-weight="800" font-size="26" fill="#a78bfa" letter-spacing="-0.5">askalf</text>

  <!-- Headline -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="68" fill="#f0f0f2" letter-spacing="-3">Not one AI.</text>
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="68" fill="url(#crystal)" letter-spacing="-3">An entire team.</text>

  <!-- Subtext -->
  <text x="80" y="360" font-family="system-ui, sans-serif" font-weight="400" font-size="22" fill="#f0f0f2" opacity="0.45">7 autonomous agents that code, debug, deploy, and monitor</text>
  <text x="80" y="390" font-family="system-ui, sans-serif" font-weight="400" font-size="22" fill="#f0f0f2" opacity="0.45">— while you sleep. Self-hosted. Open source.</text>

  <!-- Stats -->
  <g font-family="monospace" font-size="14" font-weight="600">
    <text x="80" y="480" fill="#a78bfa">7 agents</text>
    <text x="80" y="498" fill="#f0f0f2" opacity="0.3" font-size="11" font-weight="400">specialized fleet</text>

    <text x="220" y="480" fill="#22d3ee">15 channels</text>
    <text x="220" y="498" fill="#f0f0f2" opacity="0.3" font-size="11" font-weight="400">connected</text>

    <text x="380" y="480" fill="#34d399">22 integrations</text>
    <text x="380" y="498" fill="#f0f0f2" opacity="0.3" font-size="11" font-weight="400">built in</text>

    <text x="560" y="480" fill="#fb923c">10-layer</text>
    <text x="560" y="498" fill="#f0f0f2" opacity="0.3" font-size="11" font-weight="400">cognitive memory</text>
  </g>

  <!-- URL -->
  <text x="80" y="570" font-family="monospace" font-weight="600" font-size="16" fill="#a78bfa" opacity="0.6">askalf.org</text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#f0f0f2" stroke-width="1" opacity="0.04"/>
</svg>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AskAlf — X Banner</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .frame { width: 1500px; height: 500px; position: relative; overflow: hidden; background: #04040a; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; height: 100%; padding: 0 80px; }
    .left { max-width: 700px; }
    .headline { font-family: 'Satoshi', system-ui, sans-serif; font-size: 64px; font-weight: 900; color: #f0f0f2; line-height: 1.1; letter-spacing: -0.04em; margin-bottom: 16px; }
    .headline em { font-style: normal; background: linear-gradient(135deg, #c4b5fd, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subline { font-family: 'Satoshi', system-ui, sans-serif; font-size: 20px; color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 24px; }
    .url { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #a78bfa; font-weight: 600; letter-spacing: 0.03em; }
    .right { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
    .agent-row { display: flex; align-items: center; gap: 10px; }
    .agent-dot { width: 10px; height: 10px; border-radius: 50%; }
    .agent-name { font-family: 'Satoshi', system-ui, sans-serif; font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.7); }
    .agent-role { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.25); margin-left: 8px; }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="c"></canvas>
    <div class="content">
      <div class="left">
        <div class="headline">Not one AI.<br><em>An entire team.</em></div>
        <div class="subline">7 autonomous agents. Self-hosted. Open source.</div>
        <div class="url">askalf.org</div>
      </div>
      <div class="right">
        <div class="agent-row"><span class="agent-name">Backend Dev</span><span class="agent-dot" style="background:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,.5)"></span></div>
        <div class="agent-row"><span class="agent-name">Frontend Dev</span><span class="agent-dot" style="background:#a78bfa;box-shadow:0 0 8px rgba(167,139,250,.5)"></span></div>
        <div class="agent-row"><span class="agent-name">QA</span><span class="agent-dot" style="background:#34d399;box-shadow:0 0 8px rgba(52,211,153,.5)"></span></div>
        <div class="agent-row"><span class="agent-name">Infra</span><span class="agent-dot" style="background:#fb923c;box-shadow:0 0 8px rgba(251,146,60,.5)"></span></div>
        <div class="agent-row"><span class="agent-name">Security</span><span class="agent-dot" style="background:#f87171;box-shadow:0 0 8px rgba(248,113,113,.5)"></span></div>
        <div class="agent-row"><span class="agent-name">Watchdog</span><span class="agent-dot" style="background:#2dd4bf;box-shadow:0 0 8px rgba(45,212,191,.5)"></span></div>
        <div class="agent-row"><span class="agent-name">Writer</span><span class="agent-dot" style="background:#e879f9;box-shadow:0 0 8px rgba(232,121,249,.5)"></span></div>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const w = 1500, h = 500;
    canvas.width = w * 2; canvas.height = h * 2;
    ctx.setTransform(2, 0, 0, 2, 0, 0);

    const particles = [];
    const colors = [[124,58,237],[167,139,250],[96,165,250],[52,211,153],[34,211,238],[251,146,60]];
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 0.5,
        c: colors[Math.floor(Math.random() * colors.length)],
        ph: Math.random() * Math.PI * 2,
      });
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);

      // Nebula
      const nb = ctx.createRadialGradient(w * 0.3, h * 0.4, 0, w * 0.3, h * 0.4, w * 0.4);
      nb.addColorStop(0, 'rgba(124,58,237,0.04)');
      nb.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = nb;
      ctx.fillRect(0, 0, w, h);

      const nb2 = ctx.createRadialGradient(w * 0.8, h * 0.6, 0, w * 0.8, h * 0.6, w * 0.3);
      nb2.addColorStop(0, 'rgba(34,211,238,0.02)');
      nb2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = nb2;
      ctx.fillRect(0, 0, w, h);

      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
        const b = Math.sin(t * 0.001 + p.ph) * 0.3 + 0.7;
        const r = p.r * b;

        const gl = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 5);
        gl.addColorStop(0, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},0.12)`);
        gl.addColorStop(1, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);
        ctx.beginPath(); ctx.arc(p.x, p.y, r * 5, 0, Math.PI * 2);
        ctx.fillStyle = gl; ctx.fill();

        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${0.4 + b * 0.2})`;
        ctx.fill();
      }

      // Connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b2 = particles[j];
          const dx = a.x - b2.x, dy = a.y - b2.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b2.x, b2.y);
            ctx.strokeStyle = `rgba(124,58,237,${(1 - dist/120) * 0.08})`;
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>

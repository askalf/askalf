<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#06060b"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Circular clip for profile picture shape -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background (will be clipped to circle by X/Twitter) -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="url(#centerGlow)"/>

  <!-- Subtle ring at edge -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.08"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.05"/>

  <!-- Merkle DAG — compact, centered -->
  <!-- Main chain -->
  <circle cx="100" cy="175" r="8" fill="url(#nodeGrad)" opacity="0.6"/>
  <circle cx="160" cy="175" r="9" fill="url(#nodeGrad)" opacity="0.75"/>
  <circle cx="225" cy="175" r="12" fill="url(#nodeGrad)" opacity="0.95"/>
  <!-- Fork point glow -->
  <circle cx="225" cy="175" r="28" fill="#3b82f6" opacity="0.05"/>

  <!-- Main chain edges -->
  <line x1="108" y1="175" x2="151" y2="175" stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="169" y1="175" x2="213" y2="175" stroke="#3b82f6" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Branch A — upper right -->
  <path d="M235 167 Q265 130 295 118" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="305" cy="114" r="7" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="350" cy="98" r="5" fill="#8b5cf6" opacity="0.4"/>
  <line x1="312" y1="112" x2="345" y2="100" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Branch B — lower right -->
  <path d="M235 183 Q265 220 295 235" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="305" cy="240" r="7" fill="#06b6d4" opacity="0.7"/>
  <circle cx="350" cy="258" r="5" fill="#06b6d4" opacity="0.4"/>
  <line x1="312" y1="242" x2="345" y2="256" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Continue straight -->
  <circle cx="295" cy="175" r="7" fill="url(#nodeGrad)" opacity="0.6"/>
  <circle cx="350" cy="175" r="5" fill="#3b82f6" opacity="0.35"/>
  <line x1="237" y1="175" x2="288" y2="175" stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="302" y1="175" x2="345" y2="175" stroke="#3b82f6" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Replay arrow -->
  <path d="M145 210 C115 225 90 218 90 200 C90 186 105 180 115 183" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <polygon points="118,177 110,188 123,186" fill="#3b82f6" opacity="0.3"/>

  <!-- Small decorative dots -->
  <circle cx="60" cy="140" r="3" fill="#3b82f6" opacity="0.15"/>
  <circle cx="50" cy="210" r="2" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="340" cy="140" r="2" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="360" cy="220" r="2" fill="#06b6d4" opacity="0.1"/>

  <!-- Text: CLAW -->
  <text x="200" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="52" font-weight="700" fill="url(#titleGrad)" letter-spacing="6">CLAW</text>

  <!-- Subtle subtitle -->
  <text x="200" y="350" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#5a5e72" letter-spacing="3">REPLAY</text>
</svg>

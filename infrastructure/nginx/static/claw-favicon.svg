<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#06060b"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="96" fill="url(#centerGlow)"/>

  <!-- Subtle rings -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.08"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="#8b5cf6" stroke-width="0.6" opacity="0.05"/>

  <!-- Merkle DAG — compact, centered -->
  <!-- Main chain -->
  <circle cx="128" cy="224" r="10" fill="url(#nodeGrad)" opacity="0.6"/>
  <circle cx="205" cy="224" r="12" fill="url(#nodeGrad)" opacity="0.75"/>
  <circle cx="288" cy="224" r="15" fill="url(#nodeGrad)" opacity="0.95"/>
  <!-- Fork point glow -->
  <circle cx="288" cy="224" r="36" fill="#3b82f6" opacity="0.05"/>

  <!-- Main chain edges -->
  <line x1="138" y1="224" x2="193" y2="224" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="217" y1="224" x2="273" y2="224" stroke="#3b82f6" stroke-width="3" opacity="0.5" stroke-linecap="round"/>

  <!-- Branch A — upper right -->
  <path d="M301 214 Q338 168 380 150" stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="390" cy="146" r="9" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="446" cy="126" r="6" fill="#8b5cf6" opacity="0.4"/>
  <line x1="399" y1="143" x2="440" y2="129" stroke="#8b5cf6" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Branch B — lower right -->
  <path d="M301 234 Q338 280 380 300" stroke="#06b6d4" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="390" cy="306" r="9" fill="#06b6d4" opacity="0.7"/>
  <circle cx="446" cy="330" r="6" fill="#06b6d4" opacity="0.4"/>
  <line x1="399" y1="309" x2="440" y2="327" stroke="#06b6d4" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Continue straight -->
  <circle cx="378" cy="224" r="9" fill="url(#nodeGrad)" opacity="0.6"/>
  <circle cx="446" cy="224" r="6" fill="#3b82f6" opacity="0.35"/>
  <line x1="303" y1="224" x2="369" y2="224" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="387" y1="224" x2="440" y2="224" stroke="#3b82f6" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <!-- Replay arrow -->
  <path d="M186 268 C148 288 115 278 115 256 C115 238 134 230 148 234" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <polygon points="152,226 141,240 157,237" fill="#3b82f6" opacity="0.3"/>

  <!-- Small decorative dots -->
  <circle cx="76" cy="180" r="4" fill="#3b82f6" opacity="0.15"/>
  <circle cx="64" cy="270" r="3" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="436" cy="180" r="3" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="460" cy="282" r="3" fill="#06b6d4" opacity="0.1"/>

  <!-- Text: CLAW -->
  <text x="256" y="410" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="66" font-weight="700" fill="url(#titleGrad)" letter-spacing="8">CLAW</text>

  <!-- Subtle subtitle -->
  <text x="256" y="448" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#5a5e72" letter-spacing="4">REPLAY</text>
</svg>

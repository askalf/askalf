<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="60%" cy="70%" r="25%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#glow1)"/>
  <rect width="1500" height="500" fill="url(#glow2)"/>
  <rect width="1500" height="500" fill="url(#glow3)"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1050" y1="0" x2="1050" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1350" y1="0" x2="1350" y2="500"/>
  </g>

  <!-- === Full-width Merkle DAG spanning the banner === -->

  <!-- Far left chain (fading in) -->
  <circle cx="80" cy="250" r="4" fill="#3b82f6" opacity="0.15"/>
  <circle cx="140" cy="250" r="5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="200" cy="250" r="5" fill="#3b82f6" opacity="0.25"/>
  <line x1="84" y1="250" x2="135" y2="250" stroke="#3b82f6" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  <line x1="145" y1="250" x2="195" y2="250" stroke="#3b82f6" stroke-width="1" opacity="0.18" stroke-linecap="round"/>

  <!-- Left section nodes -->
  <circle cx="270" cy="250" r="6" fill="#3b82f6" opacity="0.35"/>
  <circle cx="350" cy="250" r="6" fill="#3b82f6" opacity="0.4"/>
  <circle cx="430" cy="250" r="7" fill="#3b82f6" opacity="0.5"/>
  <line x1="205" y1="250" x2="264" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="276" y1="250" x2="344" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="356" y1="250" x2="423" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- First fork point -->
  <circle cx="520" cy="250" r="9" fill="url(#nodeGrad)" opacity="0.7"/>
  <circle cx="520" cy="250" r="18" fill="#3b82f6" opacity="0.04"/>
  <line x1="437" y1="250" x2="511" y2="250" stroke="#3b82f6" stroke-width="2" opacity="0.45" stroke-linecap="round"/>

  <!-- First fork — branch up -->
  <path d="M529 244 Q560 200 600 185" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <circle cx="610" cy="180" r="6" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="680" cy="165" r="5" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="740" cy="155" r="4" fill="#8b5cf6" opacity="0.2"/>
  <line x1="616" y1="178" x2="674" y2="167" stroke="#8b5cf6" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="685" y1="164" x2="736" y2="157" stroke="#8b5cf6" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- First fork — branch down -->
  <path d="M529 256 Q560 300 600 315" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <circle cx="610" cy="320" r="6" fill="#06b6d4" opacity="0.5"/>
  <circle cx="680" cy="340" r="5" fill="#06b6d4" opacity="0.35"/>
  <circle cx="740" cy="350" r="4" fill="#06b6d4" opacity="0.2"/>
  <line x1="616" y1="322" x2="674" y2="338" stroke="#06b6d4" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="685" y1="341" x2="736" y2="349" stroke="#06b6d4" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- Main branch continues -->
  <circle cx="610" cy="250" r="7" fill="#3b82f6" opacity="0.55"/>
  <circle cx="700" cy="250" r="7" fill="#3b82f6" opacity="0.6"/>
  <line x1="529" y1="250" x2="603" y2="250" stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="617" y1="250" x2="693" y2="250" stroke="#3b82f6" stroke-width="2" opacity="0.45" stroke-linecap="round"/>

  <!-- ===== CENTER: Title text ===== -->
  <!-- Second fork point (right of center) -->
  <circle cx="800" cy="250" r="10" fill="url(#nodeGrad)" opacity="0.8"/>
  <circle cx="800" cy="250" r="22" fill="#3b82f6" opacity="0.05"/>
  <line x1="707" y1="250" x2="790" y2="250" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Second fork — up -->
  <path d="M810 243 Q845 195 885 175" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <circle cx="895" cy="170" r="6" fill="#8b5cf6" opacity="0.55"/>
  <circle cx="965" cy="150" r="5" fill="#8b5cf6" opacity="0.4"/>
  <line x1="901" y1="168" x2="960" y2="153" stroke="#8b5cf6" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Second fork — down -->
  <path d="M810 257 Q845 305 885 325" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <circle cx="895" cy="330" r="6" fill="#06b6d4" opacity="0.55"/>
  <circle cx="965" cy="350" r="5" fill="#06b6d4" opacity="0.4"/>
  <line x1="901" y1="332" x2="960" y2="348" stroke="#06b6d4" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Continue main after second fork -->
  <circle cx="895" cy="250" r="7" fill="#3b82f6" opacity="0.55"/>
  <circle cx="980" cy="250" r="7" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1060" cy="250" r="6" fill="#3b82f6" opacity="0.4"/>
  <line x1="810" y1="250" x2="888" y2="250" stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="902" y1="250" x2="973" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <line x1="987" y1="250" x2="1054" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Third fork -->
  <circle cx="1140" cy="250" r="8" fill="url(#nodeGrad)" opacity="0.6"/>
  <circle cx="1140" cy="250" r="16" fill="#3b82f6" opacity="0.03"/>
  <line x1="1066" y1="250" x2="1132" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <path d="M1148 244 Q1175 210 1210 195" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <circle cx="1220" cy="190" r="5" fill="#10b981" opacity="0.45"/>
  <circle cx="1290" cy="175" r="4" fill="#10b981" opacity="0.3"/>
  <line x1="1225" y1="189" x2="1286" y2="177" stroke="#10b981" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <path d="M1148 256 Q1175 290 1210 305" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <circle cx="1220" cy="310" r="5" fill="#f59e0b" opacity="0.4"/>
  <circle cx="1290" cy="325" r="4" fill="#f59e0b" opacity="0.25"/>
  <line x1="1225" y1="312" x2="1286" y2="323" stroke="#f59e0b" stroke-width="1" opacity="0.18" stroke-linecap="round"/>

  <!-- Far right (fading out) -->
  <circle cx="1220" cy="250" r="5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1300" cy="250" r="4" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1370" cy="250" r="3" fill="#3b82f6" opacity="0.12"/>
  <circle cx="1430" cy="250" r="2" fill="#3b82f6" opacity="0.06"/>
  <line x1="1148" y1="250" x2="1215" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="1225" y1="250" x2="1296" y2="250" stroke="#3b82f6" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="1304" y1="250" x2="1367" y2="250" stroke="#3b82f6" stroke-width="1" opacity="0.08" stroke-linecap="round"/>
  <line x1="1373" y1="250" x2="1428" y2="250" stroke="#3b82f6" stroke-width="1" opacity="0.04" stroke-linecap="round"/>

  <!-- Replay arrow (near first fork) -->
  <path d="M480 290 C440 310 400 300 400 275 C400 258 418 250 432 254" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>
  <polygon points="436,247 427,260 442,257" fill="#3b82f6" opacity="0.2"/>

  <!-- ===== TEXT OVERLAY ===== -->
  <!-- Title — centered -->
  <text x="750" y="225" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="68" font-weight="700" fill="url(#titleGrad)" letter-spacing="-1" opacity="0.95">Claw Replay</text>

  <!-- Subtitle -->
  <text x="750" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="22" fill="#8b8fa3" letter-spacing="0.5" opacity="0.85">Time-Travel Debugging for AI Conversations</text>

  <!-- Feature pills centered below -->
  <g font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="11" letter-spacing="0.5">
    <rect x="490" y="310" width="100" height="26" rx="5" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.18" stroke-width="1"/>
    <text x="540" y="327" text-anchor="middle" fill="#3b82f6" opacity="0.8">Merkle DAG</text>

    <rect x="604" y="310" width="104" height="26" rx="5" fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.18" stroke-width="1"/>
    <text x="656" y="327" text-anchor="middle" fill="#8b5cf6" opacity="0.8">Ghost Mode</text>

    <rect x="722" y="310" width="90" height="26" rx="5" fill="#06b6d4" fill-opacity="0.06" stroke="#06b6d4" stroke-opacity="0.18" stroke-width="1"/>
    <text x="767" y="327" text-anchor="middle" fill="#06b6d4" opacity="0.8">Forensics</text>

    <rect x="826" y="310" width="86" height="26" rx="5" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-opacity="0.18" stroke-width="1"/>
    <text x="869" y="327" text-anchor="middle" fill="#10b981" opacity="0.8">.claw files</text>

    <rect x="926" y="310" width="84" height="26" rx="5" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-opacity="0.18" stroke-width="1"/>
    <text x="968" y="327" text-anchor="middle" fill="#f59e0b" opacity="0.8">Deja Vu</text>
  </g>

  <!-- Domain — bottom center -->
  <text x="750" y="440" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#5a5e72" letter-spacing="3" opacity="0.6">integration.tax</text>
</svg>

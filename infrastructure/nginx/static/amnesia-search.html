<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>amnesia.tax — Search</title>
  <meta name="description" content="World's fastest aggregated search engine - powered by Sprayberry Labs">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="amnesia.tax">
  <meta property="og:description" content="Every engine at once. No AI. No memory.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://amnesia.tax">
  <meta property="og:site_name" content="amnesia.tax">
  <meta property="og:image" content="https://amnesia.tax/og.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="amnesia.tax — aggregated search engine">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="amnesia.tax">
  <meta name="twitter:description" content="Every engine at once. No AI. No memory.">
  <meta name="twitter:image" content="https://amnesia.tax/og.png">
  <meta name="twitter:image:alt" content="amnesia.tax — aggregated search engine">
  <meta name="theme-color" content="#0c0c14">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230a0a0f'/><text x='50' y='68' text-anchor='middle' font-size='56' font-family='system-ui' font-weight='700' fill='%238b5cf6'>a</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      background: #0c0c14;
      color: #d8d8e0;
    }

    /* Eerie animated background */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(127, 29, 29, 0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(30, 58, 138, 0.12) 0%, transparent 50%);
      z-index: 0;
      animation: bgDrift 20s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    /* Noise overlay */
    .bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    /* Scanline effect */
    .bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .shell.landing {
      justify-content: center;
      align-items: center;
    }

    .shell.results-mode {
      justify-content: flex-start;
    }

    /* Search header */
    .search-header {
      width: 100%;
      max-width: 680px;
      padding: 0 1.5rem;
      transition: all 0.3s ease;
    }

    .landing .search-header {
      text-align: center;
    }

    .results-mode .search-header {
      padding: 1.5rem;
      max-width: 100%;
      border-bottom: 1px solid rgba(139, 92, 246, 0.08);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, #7c3aed, #991b1b, #7c3aed);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      user-select: none;
      animation: logoShift 8s ease-in-out infinite;
      text-transform: lowercase;
    }

    @keyframes logoShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .landing .logo {
      display: none;
    }

    .results-mode .logo {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .search-box {
      display: flex;
      width: 100%;
      max-width: 680px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 2px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.03);
    }

    .search-box:focus-within {
      border-color: rgba(139, 92, 246, 0.35);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.06), inset 0 0 20px rgba(139, 92, 246, 0.02);
    }

    .search-box input {
      flex: 1;
      padding: 1rem 1.2rem;
      background: transparent;
      border: none;
      outline: none;
      color: #d4d4dc;
      font-size: 0.95rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.02em;
    }

    .search-box input::placeholder {
      color: #6a6a80;
      font-style: italic;
    }

    .search-box button {
      padding: 1rem 1.4rem;
      background: transparent;
      border: none;
      color: rgba(139, 92, 246, 0.7);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .search-box button:hover {
      color: rgba(139, 92, 246, 0.9);
      text-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
    }

    .landing .subtitle {
      margin-top: 1.2rem;
      font-size: 0.7rem;
      color: #9a9ab0;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Results area */
    .results-area {
      max-width: 780px;
      padding: 1.5rem 2rem;
    }

    .results-meta {
      font-size: 0.75rem;
      color: #6a6a80;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      letter-spacing: 0.05em;
    }

    .results-meta .engine-tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      background: rgba(139, 92, 246, 0.06);
      border: 1px solid rgba(139, 92, 246, 0.1);
      border-radius: 1px;
      font-size: 0.65rem;
      color: rgba(167, 139, 250, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .result-item {
      margin-bottom: 1.75rem;
      padding-left: 0.75rem;
      border-left: 1px solid rgba(139, 92, 246, 0.12);
      transition: border-color 0.3s;
    }

    .result-item:hover {
      border-left-color: rgba(139, 92, 246, 0.25);
    }

    .result-item a {
      text-decoration: none;
    }

    .result-url {
      font-size: 0.7rem;
      color: rgba(74, 222, 128, 0.6);
      margin-bottom: 0.2rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .result-title {
      font-size: 1rem;
      font-weight: 700;
      color: rgba(196, 181, 253, 0.95);
      margin-bottom: 0.35rem;
      line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .result-title:hover {
      color: rgba(196, 181, 253, 1);
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
    }

    .result-snippet {
      font-size: 0.82rem;
      color: #9090a0;
      line-height: 1.7;
    }

    .result-engines {
      margin-top: 0.3rem;
      font-size: 0.65rem;
      color: #5a5a70;
      letter-spacing: 0.05em;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem;
      color: #6a6a80;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-top-color: rgba(139, 92, 246, 0.6);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      padding: 2rem;
      color: rgba(248, 113, 113, 0.8);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    .no-results {
      padding: 2rem;
      color: #6a6a80;
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      padding: 0 2rem;
      max-width: 780px;
    }

    .suggestions button {
      padding: 0.35rem 0.8rem;
      background: rgba(139, 92, 246, 0.03);
      border: 1px solid rgba(139, 92, 246, 0.08);
      border-radius: 1px;
      color: #808098;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      transition: all 0.3s;
      letter-spacing: 0.03em;
    }

    .suggestions button:hover {
      background: rgba(139, 92, 246, 0.08);
      border-color: rgba(139, 92, 246, 0.2);
      color: rgba(196, 181, 253, 0.9);
    }

    /* Footer */
    .footer {
      padding: 2rem;
      max-width: 780px;
      font-size: 0.65rem;
      color: #5a5a70;
      border-top: 1px solid rgba(139, 92, 246, 0.04);
      margin-top: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Mobile */
    @media (max-width: 640px) {
      .search-header {
        padding: 0 1rem;
      }

      .results-mode .search-header {
        padding: 1rem;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .results-mode .logo {
        font-size: 1rem;
      }

      .search-box input {
        padding: 0.85rem 1rem;
        font-size: 16px; /* prevents iOS zoom on focus */
      }

      .search-box button {
        padding: 0.85rem 1rem;
      }

      .landing .subtitle {
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        padding: 0 0.5rem;
      }

      .results-area {
        padding: 1rem;
      }

      .result-title {
        font-size: 0.95rem;
      }

      .result-snippet {
        font-size: 0.8rem;
      }

      .result-url {
        font-size: 0.65rem;
      }

      .results-meta {
        gap: 0.5rem;
      }

      .suggestions {
        padding: 0 1rem;
      }

      .footer {
        padding: 1.5rem 1rem;
      }
    }

    @media (max-width: 380px) {
      .landing .subtitle {
        font-size: 0.55rem;
        letter-spacing: 0.06em;
      }

      .search-box input {
        padding: 0.75rem 0.8rem;
      }
    }

    /* Flicker on landing */
    .landing .search-box {
      animation: flicker 4s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.03); }
      50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.07), 0 0 60px rgba(127, 29, 29, 0.03); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="shell landing" id="shell">
    <div class="search-header" id="searchHeader">
      <div class="logo" id="logo">amnesia.tax</div>
      <div class="search-box">
        <input type="text" id="q" placeholder="Search the web..." autofocus autocomplete="off">
        <button onclick="doSearch()" aria-label="Search">&#x25C8;</button>
      </div>
      <p class="subtitle" id="subtitle">EVERY ENGINE AT ONCE. NO AI. NO MEMORY.</p>
    </div>

    <div id="content"></div>
  </div>

  <script>
    const q = document.getElementById('q');
    const shell = document.getElementById('shell');
    const subtitle = document.getElementById('subtitle');
    const content = document.getElementById('content');

    q.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

    const params = new URLSearchParams(location.search);
    if (params.get('q')) {
      q.value = params.get('q');
      doSearch();
    }

    document.getElementById('logo').addEventListener('click', () => {
      shell.className = 'shell landing';
      content.innerHTML = '';
      q.value = '';
      subtitle.style.display = '';
      history.pushState(null, '', '/');
      q.focus();
    });

    async function doSearch() {
      const query = q.value.trim();
      if (!query) return;

      shell.className = 'shell results-mode';
      subtitle.style.display = 'none';

      history.pushState(null, '', '/?q=' + encodeURIComponent(query));

      content.innerHTML = '<div class="loading"><div class="spinner"></div>searching...</div>';

      try {
        const res = await fetch('/search?q=' + encodeURIComponent(query) + '&format=json');
        if (!res.ok) throw new Error('Search failed (' + res.status + ')');
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        content.innerHTML = '<div class="error-msg">' + escapeHtml(err.message) + '</div>';
      }
    }

    function renderResults(data) {
      const results = data.results || [];
      const engines = new Set();
      results.forEach(r => (r.engines || [r.engine]).forEach(e => engines.add(e)));

      let html = '<div class="results-area">';

      html += '<div class="results-meta">';
      html += '<span>' + results.length + ' found</span>';
      Array.from(engines).sort().forEach(e => {
        html += '<span class="engine-tag">' + escapeHtml(e) + '</span>';
      });
      html += '</div>';

      if (results.length === 0) {
        html += '<div class="no-results">nothing here. try again.</div>';
      }

      const seen = new Set();
      results.forEach(r => {
        if (seen.has(r.url)) return;
        seen.add(r.url);

        const domain = new URL(r.url).hostname.replace(/^www\./, '');
        html += '<div class="result-item"><a href="' + escapeAttr(r.url) + '" target="_blank" rel="noopener">';
        html += '<div class="result-url">' + escapeHtml(domain) + '</div>';
        html += '<div class="result-title">' + escapeHtml(r.title || r.url) + '</div>';
        html += '</a>';
        if (r.content) html += '<div class="result-snippet">' + escapeHtml(truncate(r.content, 280)) + '</div>';
        if (r.engines && r.engines.length > 1) {
          html += '<div class="result-engines">' + r.engines.join(' / ') + '</div>';
        }
        html += '</div>';
      });

      html += '</div>';

      if (data.suggestions && data.suggestions.length > 0) {
        html += '<div class="suggestions">';
        data.suggestions.forEach(s => {
          html += '<button onclick="suggestSearch(this)">' + escapeHtml(s) + '</button>';
        });
        html += '</div>';
      }

      html += '<div class="footer">amnesia.tax &mdash; powered by Sprayberry Labs</div>';

      content.innerHTML = html;
    }

    function suggestSearch(btn) {
      q.value = btn.textContent;
      doSearch();
      window.scrollTo(0, 0);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function escapeAttr(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function truncate(s, n) {
      return (s && s.length > n) ? s.slice(0, n) + '...' : (s || '');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALFSpace - On Hold</title>
  <meta name="description" content="ALFSpace has been put on hold pending further notice.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="ALFSpace - On Hold">
  <meta property="og:description" content="This project has been put on hold pending further notice.">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(15, 82, 186, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(6, 95, 70, 0.08) 0%, transparent 50%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status {
      display: inline-block;
      padding: 0.35rem 1rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.2);
      margin-bottom: 2rem;
    }

    .message {
      font-size: 1rem;
      line-height: 1.7;
      color: #9ca3af;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 auto 1.5rem;
    }

    .footer {
      font-size: 0.8rem;
      color: #4b5563;
    }

    .footer a {
      color: #6b7280;
      text-decoration: none;
      border-bottom: 1px solid rgba(107, 114, 128, 0.3);
    }

    .footer a:hover {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="icon">&#x23F8;&#xFE0F;</div>
    <div class="logo">ALFSpace</div>
    <div class="status">On Hold</div>
    <p class="message">
      This project has been put on hold pending further notice.
    </p>
    <div class="divider"></div>
    <p class="footer">
      <a href="https://askalf.org">askalf.org</a>
    </p>
  </div>
</body>
</html>

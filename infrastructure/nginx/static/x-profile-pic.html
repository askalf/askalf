<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AskAlf — X Profile Picture</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .frame { width: 400px; height: 400px; position: relative; overflow: hidden; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="c"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 800;
    const w = 800, h = 800, cx = w/2, cy = h/2;

    const agents = [
      { c: [96,165,250] },
      { c: [167,139,250] },
      { c: [52,211,153] },
      { c: [251,146,60] },
      { c: [248,113,113] },
      { c: [45,212,191] },
      { c: [232,121,249] },
    ];

    function draw(t) {
      // Background
      ctx.fillStyle = '#04040a';
      ctx.fillRect(0, 0, w, h);

      // Nebula
      const nb = ctx.createRadialGradient(cx, cy*.9, 0, cx, cy*.9, w*.45);
      nb.addColorStop(0, 'rgba(124,58,237,0.06)');
      nb.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = nb;
      ctx.fillRect(0, 0, w, h);

      const maxR = 250;

      // Orbital rings
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.arc(cx, cy, maxR * (i/3), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(124,58,237,${0.06 + i * 0.02})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Core glow
      const pulse = Math.sin(t * 0.002) * 0.3 + 0.7;
      const coreR = 50 + pulse * 8;

      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 3);
      glow.addColorStop(0, `rgba(124,58,237,${0.15 * pulse})`);
      glow.addColorStop(0.5, `rgba(124,58,237,${0.05 * pulse})`);
      glow.addColorStop(1, 'rgba(124,58,237,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, coreR * 3, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Core
      const cg = ctx.createRadialGradient(cx - 8, cy - 8, 0, cx, cy, coreR);
      cg.addColorStop(0, 'rgba(196,181,253,0.95)');
      cg.addColorStop(0.5, 'rgba(167,139,250,0.9)');
      cg.addColorStop(1, 'rgba(124,58,237,0.7)');
      ctx.beginPath();
      ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
      ctx.fillStyle = cg;
      ctx.fill();

      // "alf" text in core
      ctx.font = "800 38px Satoshi, system-ui, sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillText('alf', cx, cy);

      // Agent satellites
      agents.forEach((a, i) => {
        const orbitR = maxR * 0.55 + (i % 3) * (maxR * 0.17);
        const speed = 0.0004 + (i * 0.618 % 1) * 0.0003;
        const angle = t * speed + (i * Math.PI * 2) / agents.length;
        const ax = cx + Math.cos(angle) * orbitR;
        const ay = cy + Math.sin(angle) * orbitR;
        const c = a.c;
        const nR = 14;

        // Connection line
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(ax, ay);
        ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.1)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Corona
        const corona = ctx.createRadialGradient(ax, ay, nR * 0.5, ax, ay, nR * 2.5);
        corona.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},0.2)`);
        corona.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
        ctx.beginPath();
        ctx.arc(ax, ay, nR * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = corona;
        ctx.fill();

        // Node
        const ng = ctx.createRadialGradient(ax - 3, ay - 3, 0, ax, ay, nR);
        ng.addColorStop(0, `rgba(${Math.min(255,c[0]+40)},${Math.min(255,c[1]+40)},${Math.min(255,c[2]+40)},0.95)`);
        ng.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0.7)`);
        ctx.beginPath();
        ctx.arc(ax, ay, nR, 0, Math.PI * 2);
        ctx.fillStyle = ng;
        ctx.fill();
      });

      // Synaptic pulses
      for (let i = 0; i < 3; i++) {
        const pi = (t * 0.001 + i * 0.33) % 1;
        const ai = Math.floor((t * 0.0001 + i * 2.618) % agents.length);
        const a = agents[ai];
        const orbitR = maxR * 0.55 + (ai % 3) * (maxR * 0.17);
        const angle = t * (0.0004 + (ai * 0.618 % 1) * 0.0003) + (ai * Math.PI * 2) / agents.length;
        const ax = cx + Math.cos(angle) * orbitR;
        const ay = cy + Math.sin(angle) * orbitR;
        const px = cx + (ax - cx) * pi;
        const py = cy + (ay - cy) * pi;
        const c = a.c;

        const pg = ctx.createRadialGradient(px, py, 0, px, py, 12);
        pg.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},0.5)`);
        pg.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
        ctx.beginPath();
        ctx.arc(px, py, 12, 0, Math.PI * 2);
        ctx.fillStyle = pg;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.8)`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>

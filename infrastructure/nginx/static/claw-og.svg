<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="branchA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="branchB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Merkle DAG visualization (right side, decorative) -->
  <!-- Main branch nodes -->
  <circle cx="680" cy="315" r="8" fill="url(#nodeGrad)" opacity="0.5"/>
  <circle cx="760" cy="315" r="8" fill="url(#nodeGrad)" opacity="0.6"/>
  <circle cx="840" cy="315" r="10" fill="url(#nodeGrad)" opacity="0.8"/>
  <!-- Fork point glow -->
  <circle cx="840" cy="315" r="24" fill="#3b82f6" opacity="0.06"/>
  <!-- Branch A -->
  <circle cx="920" cy="260" r="7" fill="url(#branchA)" opacity="0.6"/>
  <circle cx="990" cy="230" r="6" fill="url(#branchA)" opacity="0.4"/>
  <circle cx="1050" cy="210" r="5" fill="url(#branchA)" opacity="0.3"/>
  <!-- Branch B -->
  <circle cx="920" cy="370" r="7" fill="url(#branchB)" opacity="0.6"/>
  <circle cx="990" cy="400" r="6" fill="url(#branchB)" opacity="0.4"/>
  <circle cx="1050" cy="420" r="5" fill="url(#branchB)" opacity="0.3"/>
  <!-- Branch C (straight) -->
  <circle cx="920" cy="315" r="7" fill="url(#nodeGrad)" opacity="0.5"/>
  <circle cx="990" cy="315" r="6" fill="url(#nodeGrad)" opacity="0.35"/>
  <circle cx="1050" cy="315" r="5" fill="url(#nodeGrad)" opacity="0.2"/>

  <!-- Edges -->
  <line x1="688" y1="315" x2="752" y2="315" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="768" y1="315" x2="830" y2="315" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Fork edges -->
  <path d="M850 308 Q880 270 913 263" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <line x1="927" y1="257" x2="984" y2="234" stroke="#8b5cf6" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="996" y1="228" x2="1044" y2="214" stroke="#8b5cf6" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <path d="M850 322 Q880 360 913 367" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <line x1="927" y1="373" x2="984" y2="397" stroke="#06b6d4" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="996" y1="403" x2="1044" y2="417" stroke="#06b6d4" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="850" y1="315" x2="913" y2="315" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="927" y1="315" x2="984" y2="315" stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="996" y1="315" x2="1044" y2="315" stroke="#3b82f6" stroke-width="1" opacity="0.1" stroke-linecap="round"/>

  <!-- Replay arrow (subtle) -->
  <path d="M770 360 C730 380 690 370 690 340 C690 320 710 310 725 315" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.25" stroke-linecap="round"/>
  <polygon points="728,308 720,320 734,318" fill="#3b82f6" opacity="0.25"/>

  <!-- Title -->
  <text x="100" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="80" font-weight="700" fill="url(#titleGrad)" letter-spacing="-2">Claw Replay</text>

  <!-- Subtitle -->
  <text x="100" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="28" fill="#8b8fa3" letter-spacing="0.5">Time-Travel Debugging for AI Conversations</text>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="13" letter-spacing="0.5">
    <rect x="100" y="340" width="120" height="30" rx="6" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="160" y="360" text-anchor="middle" fill="#3b82f6">Merkle DAG</text>

    <rect x="236" y="340" width="130" height="30" rx="6" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="301" y="360" text-anchor="middle" fill="#8b5cf6">Ghost Mode</text>

    <rect x="382" y="340" width="110" height="30" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-opacity="0.2" stroke-width="1"/>
    <text x="437" y="360" text-anchor="middle" fill="#06b6d4">Forensics</text>

    <rect x="508" y="340" width="100" height="30" rx="6" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
    <text x="558" y="360" text-anchor="middle" fill="#10b981">.claw files</text>
  </g>

  <!-- Divider -->
  <line x1="100" y1="420" x2="300" y2="420" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Domain -->
  <text x="100" y="460" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="16" fill="#5a5e72" letter-spacing="2">integration.tax</text>

  <!-- Bottom label -->
  <text x="100" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="14" fill="#3d3f50" letter-spacing="3" text-transform="uppercase">SPRAYBERRY LABS</text>
</svg>

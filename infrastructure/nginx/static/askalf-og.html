<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AskAlf OG Image — Screenshot at 1200x630</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .frame { width: 1200px; height: 630px; position: relative; overflow: hidden; background: #04040a; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .content { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; height: 100%; padding: 0 70px; }
    .left { max-width: 580px; }
    .headline { font-family: 'Satoshi', system-ui; font-size: 62px; font-weight: 900; color: #f0f0f2; line-height: 1.08; letter-spacing: -0.04em; margin-bottom: 20px; }
    .headline em { font-style: normal; background: linear-gradient(135deg, #c4b5fd, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subline { font-family: 'Satoshi', system-ui; font-size: 20px; color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 24px; }
    .url { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #a78bfa; font-weight: 600; letter-spacing: 0.02em; }

    /* Agent card — glassmorphism */
    .agent-card {
      background: rgba(10, 10, 25, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 40px rgba(124,58,237,0.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 260px;
    }
    .agent-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }
    .agent-name {
      font-family: 'Satoshi', system-ui;
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
    }
    .agent-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    /* Connection lines from icons to dots */
    .agent-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 14px;
      margin-right: auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="c"></canvas>
    <div class="content">
      <div class="left">
        <div class="headline">Not one AI.<br><em>An entire team.</em></div>
        <div class="subline">7 autonomous agents. Self-hosted. Open source.</div>
        <div class="url">askalf.org</div>
      </div>
      <div class="agent-card">
        <div class="agent-row"><span class="agent-icon">&#x1F4BE;</span><span class="agent-name">Backend Dev</span><span class="agent-dot" style="background:#60a5fa;box-shadow:0 0 10px rgba(96,165,250,.6)"></span></div>
        <div class="agent-row"><span class="agent-icon">&#x1F3A8;</span><span class="agent-name">Frontend Dev</span><span class="agent-dot" style="background:#a78bfa;box-shadow:0 0 10px rgba(167,139,250,.6)"></span></div>
        <div class="agent-row"><span class="agent-icon">&#x2705;</span><span class="agent-name">QA</span><span class="agent-dot" style="background:#34d399;box-shadow:0 0 10px rgba(52,211,153,.6)"></span></div>
        <div class="agent-row"><span class="agent-icon">&#x1F5A5;</span><span class="agent-name">Infra</span><span class="agent-dot" style="background:#fb923c;box-shadow:0 0 10px rgba(251,146,60,.6)"></span></div>
        <div class="agent-row"><span class="agent-icon">&#x1F6E1;</span><span class="agent-name">Security</span><span class="agent-dot" style="background:#f87171;box-shadow:0 0 10px rgba(248,113,113,.6)"></span></div>
        <div class="agent-row"><span class="agent-icon">&#x1F440;</span><span class="agent-name">Watchdog</span><span class="agent-dot" style="background:#2dd4bf;box-shadow:0 0 10px rgba(45,212,191,.6)"></span></div>
        <div class="agent-row"><span class="agent-icon">&#x270D;</span><span class="agent-name">Writer</span><span class="agent-dot" style="background:#e879f9;box-shadow:0 0 10px rgba(232,121,249,.6)"></span></div>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 630;
    canvas.width = W * 2; canvas.height = H * 2;
    ctx.setTransform(2, 0, 0, 2, 0, 0);

    // Perspective grid floor
    function drawGrid(t) {
      ctx.clearRect(0, 0, W, H);

      // Sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#04040a');
      sky.addColorStop(0.5, '#06061a');
      sky.addColorStop(1, '#04040a');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      // Nebula glow
      const nb = ctx.createRadialGradient(W * 0.3, H * 0.3, 0, W * 0.3, H * 0.3, 400);
      nb.addColorStop(0, 'rgba(124,58,237,0.06)');
      nb.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = nb;
      ctx.fillRect(0, 0, W, H);

      const nb2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, 300);
      nb2.addColorStop(0, 'rgba(34,211,238,0.03)');
      nb2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = nb2;
      ctx.fillRect(0, 0, W, H);

      // Perspective grid
      const horizon = H * 0.52;
      const vanishX = W * 0.45;
      const gridColor = 'rgba(34,211,238,0.08)';
      const gridColorBright = 'rgba(124,58,237,0.06)';

      // Horizontal lines (perspective)
      for (let i = 0; i < 20; i++) {
        const frac = i / 20;
        const y = horizon + (H - horizon) * (frac * frac); // exponential spacing
        const alpha = 0.03 + frac * 0.06;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.strokeStyle = `rgba(34,211,238,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // Vertical lines (converging to vanish point)
      for (let i = -15; i <= 15; i++) {
        const bottomX = vanishX + i * 80;
        const alpha = 0.02 + Math.abs(i) * 0.003;
        ctx.beginPath();
        ctx.moveTo(vanishX, horizon);
        ctx.lineTo(bottomX, H + 20);
        ctx.strokeStyle = `rgba(34,211,238,${Math.min(alpha, 0.08)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // Purple accent lines
      for (let i = -5; i <= 5; i += 2) {
        const bottomX = vanishX + i * 120;
        ctx.beginPath();
        ctx.moveTo(vanishX, horizon);
        ctx.lineTo(bottomX, H + 20);
        ctx.strokeStyle = 'rgba(167,139,250,0.04)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // Glow at horizon
      const hGlow = ctx.createRadialGradient(vanishX, horizon, 0, vanishX, horizon, 300);
      hGlow.addColorStop(0, 'rgba(34,211,238,0.06)');
      hGlow.addColorStop(0.5, 'rgba(124,58,237,0.03)');
      hGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = hGlow;
      ctx.fillRect(0, 0, W, H);

      // Floating particles
      const particles = 30;
      for (let i = 0; i < particles; i++) {
        const seed = i * 137.508;
        const px = ((seed * 7.31 + t * 0.01) % W);
        const py = ((seed * 3.67 + t * 0.005) % H);
        const size = (Math.sin(seed) * 0.5 + 0.5) * 1.5 + 0.5;
        const colors = [[124,58,237],[34,211,238],[167,139,250],[52,211,153]];
        const c = colors[i % colors.length];
        const alpha = (Math.sin(t * 0.002 + seed) * 0.3 + 0.5) * 0.3;

        const gl = ctx.createRadialGradient(px, py, 0, px, py, size * 4);
        gl.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${alpha})`);
        gl.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
        ctx.beginPath();
        ctx.arc(px, py, size * 4, 0, Math.PI * 2);
        ctx.fillStyle = gl;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(px, py, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha * 1.5})`;
        ctx.fill();
      }

      requestAnimationFrame(drawGrid);
    }
    requestAnimationFrame(drawGrid);
  </script>
</body>
</html>

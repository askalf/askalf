<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#04040a"/>
  <!-- Orbital ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.15"/>
  <!-- Core -->
  <circle cx="256" cy="256" r="60" fill="url(#g)" opacity="0.9"/>
  <!-- "alf" text -->
  <text x="256" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="52" fill="#fff">alf</text>
  <!-- Agent dots orbiting -->
  <circle cx="256" cy="76" r="14" fill="#60a5fa" opacity="0.8"/>
  <circle cx="412" cy="160" r="12" fill="#a78bfa" opacity="0.8"/>
  <circle cx="436" cy="310" r="13" fill="#34d399" opacity="0.8"/>
  <circle cx="340" cy="420" r="12" fill="#fb923c" opacity="0.8"/>
  <circle cx="172" cy="420" r="13" fill="#f87171" opacity="0.8"/>
  <circle cx="76" cy="310" r="12" fill="#2dd4bf" opacity="0.8"/>
  <circle cx="100" cy="160" r="14" fill="#e879f9" opacity="0.8"/>
  <!-- Pulse on core -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="60;80;60" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>

# SearXNG Settings — Search backend for amnesia.tax + agent tools
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings:
  engines:
    remove:
      - ahmia
      - torch
      - radio browser
      - wikidata
      - reuters

general:
  instance_name: "askalf-search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "cd0d9894fb473c59ce622e5a4f3df75264869345d480a0017e5201803ae62367"
  limiter: true
  image_proxy: false
  base_url: false
  real_ip:
    x_for: 1
    ipv4_prefix: 32
    ipv6_prefix: 48

ui:
  static_use_hash: true
  default_theme: simple
  results_on_new_tab: false

valkey:
  url: false  # Overridden by SEARXNG_VALKEY_URL env var

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

# Engine configuration
# Reliable: brave, bing, duckduckgo, startpage, wikipedia, github
# Unreliable from server IPs: google, google news, mojeek
engines:
  - name: brave
    disabled: false
    weight: 1.5

  - name: bing
    engine: bing
    shortcut: b
    disabled: false
    timeout: 10.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  # Google — blocked from server IPs, disabled
  - name: google
    engine: google
    shortcut: g
    disabled: true

  - name: google news
    engine: google_news
    shortcut: gn
    disabled: true

  # Mojeek — returns 403, disabled
  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: true

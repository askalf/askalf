# SearXNG Settings — Full engine configuration with VPN
# All engines enabled — routed through Gluetun VPN proxy

use_default_settings:
  engines:
    remove:
      - ahmia
      - torch

general:
  instance_name: "askalf-search"
  debug: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json
  suspended_times:
    SearxEngineAccessDenied: 300
    SearxEngineCaptcha: 600
    SearxEngineTooManyRequests: 300

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "${SEARXNG_SECRET}"
  limiter: true
  image_proxy: true
  base_url: false
  real_ip:
    x_for: 1
    ipv4_prefix: 32
    ipv6_prefix: 48

ui:
  static_use_hash: true
  default_theme: simple
  results_on_new_tab: false
  infinite_scroll: true
  query_in_title: true

valkey:
  url: false

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:
  # ============================================
  # WEB SEARCH — all major engines

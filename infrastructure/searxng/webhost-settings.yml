# SearXNG Settings — Public search backend for amnesia.tax
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings:
  engines:
    remove:
      - ahmia
      - torch
      - radio browser
      - reuters

general:
  instance_name: "amnesia.tax"
  debug: false
  donation_url: false
  contact_url: false
  privacypolicy_url: false

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json
  suspended_times:
    SearxEngineAccessDenied: 300
    SearxEngineCaptcha: 600
    SearxEngineTooManyRequests: 300

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: true
  image_proxy: true
  base_url: "https://amnesia.tax"
  real_ip:
    x_for: 1
    ipv4_prefix: 32
    ipv6_prefix: 48
  method: "GET"

ui:
  static_use_hash: true
  default_theme: simple
  results_on_new_tab: true
  infinite_scroll: true
  query_in_title: true

valkey:
  url: false  # Overridden by SEARXNG_VALKEY_URL env var

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  proxies:
    all://:
      - http://gluetun:8888

engines:
  # === Web Search (Tier 1 — fast, reliable) ===
  - name: brave
    disabled: false
    weight: 2.0
    timeout: 6.0

  - name: duckduckgo
    disabled: false
    weight: 1.5
    timeout: 6.0

  - name: startpage
    disabled: false
    weight: 1.5
    timeout: 8.0

  - name: bing
    disabled: false
    weight: 1.0
    timeout: 6.0

  # === Web Search (Tier 2 — VPN-dependent, may get blocked) ===
  - name: google
    disabled: false
    weight: 2.5
    timeout: 8.0
    use_mobile_ui: true

  - name: mojeek
    disabled: false

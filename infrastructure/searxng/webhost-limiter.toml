# SearXNG Rate Limiter — Public-facing amnesia.tax
# Tighter limits for public traffic
# Docs: https://docs.searxng.org/admin/limiter.html

[botdetection]

ipv4_prefix = 32
ipv6_prefix = 48

trusted_proxies = [
  '127.0.0.0/8',
  '::1',
  '172.16.0.0/12',
  '10.0.0.0/8',
  '192.168.0.0/16',
]

[botdetection.ip_limit]

filter_link_local = true
link_token = false

[botdetection.ip_lists]

block_ip = []

pass_ip = [
  '127.0.0.0/8',
  '172.16.0.0/12',
  '10.0.0.0/8',
  '192.168.0.0/16',
]

pass_searxng_org = false

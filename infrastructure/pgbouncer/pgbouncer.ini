;; PgBouncer configuration — multi-database pooling
;; Pools: substrate (main), forge (Agent Forge)

[databases]
substrate  = host=postgres port=5432 dbname=substrate
forge      = host=postgres port=5432 dbname=forge

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir =
user = postgres
auth_file = /etc/pgbouncer/userlist.txt
auth_type = scram-sha-256

;; Transaction pooling — connections returned to pool after each transaction
pool_mode = transaction

;; Connection limits
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5

;; Startup parameter pass-through
ignore_startup_parameters = extra_float_digits

;; Logging
log_connections = 0
log_disconnections = 0
admin_users = postgres
stats_users = substrate

;; Connection hygiene
server_reset_query = DISCARD ALL
server_lifetime = 3600
server_idle_timeout = 600

;; TCP keepalive
tcp_keepalive = 1
tcp_keepcnt = 6
tcp_keepidle = 60
tcp_keepintvl = 10

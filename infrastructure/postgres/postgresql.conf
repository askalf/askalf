# SUBSTRATE PostgreSQL Performance Configuration
# Tuned for 1.5GB container limit (~45MB total DB size)

# Preload Libraries
shared_preload_libraries = 'pg_stat_statements'

# Network Settings
listen_addresses = '*'
port = 5432

# Memory Settings (right-sized for 1.5GB container)
shared_buffers = 256MB                  # ~17% of container RAM
work_mem = 16MB                         # Per-operation memory
maintenance_work_mem = 64MB             # For VACUUM, CREATE INDEX
effective_cache_size = 768MB            # OS cache estimate

# Write-Ahead Log
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# Query Planner
random_page_cost = 1.1                  # SSD optimization
effective_io_concurrency = 200          # SSD optimization
default_statistics_target = 100

# Parallelism
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Connection Settings (pgbouncer handles pooling)
max_connections = 200

# Logging
log_min_duration_statement = 1000       # Log queries > 1s
log_checkpoints = on
log_lock_waits = on

# Autovacuum (prevent bloat)
autovacuum_vacuum_scale_factor = 0.05   # Vacuum after 5% of table changes
autovacuum_analyze_scale_factor = 0.02  # Analyze after 2% of table changes
autovacuum_vacuum_threshold = 10        # Low threshold so small tables get vacuumed too
autovacuum_analyze_threshold = 10       # Low threshold so small tables get analyzed too
autovacuum_vacuum_cost_delay = 2ms
autovacuum_naptime = 30                 # Check every 30s instead of 60s

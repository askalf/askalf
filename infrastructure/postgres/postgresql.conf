# AskAlf PostgreSQL Performance Configuration
# Tuned for 768M container limit

# Preload Libraries
shared_preload_libraries = 'pg_stat_statements'

# Network Settings
listen_addresses = '*'
port = 5432

# Memory Settings (right-sized for 768M container)
shared_buffers = 192MB                  # 25% of container RAM
work_mem = 8MB                          # Per-operation memory (conservative — many parallel queries)
maintenance_work_mem = 48MB             # For VACUUM, CREATE INDEX
effective_cache_size = 384MB            # ~50% of container RAM for OS cache estimate

# Write-Ahead Log
wal_buffers = 8MB
checkpoint_completion_target = 0.9
max_wal_size = 256MB
min_wal_size = 128MB

# Query Planner
random_page_cost = 1.1                  # SSD optimization
effective_io_concurrency = 200          # SSD optimization
default_statistics_target = 100

# Parallelism (reduced — 768M container can't afford heavy parallel workers)
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_parallel_maintenance_workers = 1

# Connection Settings
max_connections = 120
statement_timeout = '30s'            # Kill any query running > 30s (prevents O(n²) lockups)

# Logging
log_min_duration_statement = 500        # Log queries > 500ms
log_checkpoints = on
log_lock_waits = on

# Autovacuum (prevent bloat)
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_threshold = 10
autovacuum_analyze_threshold = 10
autovacuum_vacuum_cost_delay = 2ms
autovacuum_naptime = 30

# SUBSTRATE PostgreSQL Performance Configuration
# Tuned for 4GB system with pgvector workloads

# Network Settings
listen_addresses = '*'
port = 5432

# Memory Settings
shared_buffers = 1GB                    # 25% of RAM
work_mem = 64MB                         # Per-operation memory
maintenance_work_mem = 256MB            # For VACUUM, CREATE INDEX
effective_cache_size = 3GB              # OS cache estimate

# Write-Ahead Log
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# Query Planner
random_page_cost = 1.1                  # SSD optimization
effective_io_concurrency = 200          # SSD optimization
default_statistics_target = 100

# Parallelism
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Connection Settings (pgbouncer handles pooling)
max_connections = 100

# Logging
log_min_duration_statement = 1000       # Log queries > 1s
log_checkpoints = on
log_lock_waits = on

# Autovacuum (prevent bloat)
autovacuum_vacuum_scale_factor = 0.05   # More aggressive
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 2ms

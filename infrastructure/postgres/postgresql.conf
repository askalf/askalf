# AskAlf PostgreSQL Performance Configuration
# Tuned for 1G container limit, ~400MB database, pgvector workloads

# Preload Libraries
shared_preload_libraries = 'pg_stat_statements'

# Network Settings
listen_addresses = '*'
port = 5432

# Memory Settings (tuned for 1G container)
shared_buffers = 256MB                  # 25% of container RAM
work_mem = 12MB                         # Per-sort/hash — allows larger in-memory sorts for vector ops
maintenance_work_mem = 128MB            # For VACUUM, CREATE INDEX — bumped for faster pgvector index builds
effective_cache_size = 640MB            # ~64% of container RAM
huge_pages = off                        # Not available in Docker

# Write-Ahead Log
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 512MB
min_wal_size = 128MB
wal_compression = zstd

# Query Planner
random_page_cost = 1.1                  # SSD
effective_io_concurrency = 200          # SSD
default_statistics_target = 100

# Parallelism
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

# Connection Settings
max_connections = 80                    # 23 active — 120 was excessive
statement_timeout = '60s'              # Bumped from 30s for vector queries
idle_in_transaction_session_timeout = '120s'

# Logging
log_min_duration_statement = 500
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# Autovacuum (aggressive — prevent bloat from memory tables)
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_threshold = 25
autovacuum_analyze_threshold = 25
autovacuum_vacuum_cost_delay = 2ms
autovacuum_naptime = 15
autovacuum_max_workers = 3

# JIT (disable — overhead not worth it for OLTP)
jit = off

# Temp file management
temp_file_limit = 256MB

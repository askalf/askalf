# Cloudflare Tunnel Configuration for SUBSTRATE
#
# =====================================================
# TOKEN-BASED SETUP (RECOMMENDED - used in docker-compose)
# =====================================================
# The docker-compose.prod.yml uses token-based authentication.
# Configure routes in Cloudflare Zero Trust Dashboard:
#
# 1. Go to: https://one.dash.cloudflare.com/
# 2. Navigate to: Networks > Tunnels > askalf > Public Hostname
# 3. Add these routes:
#
#    | Public Hostname    | Service          |
#    |--------------------|------------------|
#    | askalf.org         | http://nginx:80  |
#    | api.askalf.org     | http://nginx:80  |
#    | app.askalf.org     | http://nginx:80  |
#
# 4. Get token: cloudflared tunnel token askalf
# 5. Add to .env.production: CLOUDFLARE_TUNNEL_TOKEN=<token>
#
# =====================================================
# CONFIG FILE SETUP (ALTERNATIVE - for local testing)
# =====================================================
# If you prefer config file over token, use this config
# and update docker-compose to mount this file.

tunnel: 2c6c0d46-20d5-4756-a222-c7e6ba7d613a
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: askalf.org
    service: http://nginx:80
  - hostname: www.askalf.org
    service: http://nginx:80
  - hostname: api.askalf.org
    service: http://nginx:80
  - hostname: app.askalf.org
    service: http://nginx:80
  - service: http_status:404

name: sprayberry-labs

services:
  # ===========================================
  # DATABASE LAYER
  # ===========================================
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm@sha256:3e8b3adfd27b5707128f60956f62a793c3c9326ea8cfaf0eab7adccb5d700b21
    container_name: sprayberry-labs-postgres
    # No exposed ports — all access through pgbouncer inside Docker network
    environment:
      POSTGRES_USER: substrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: substrate
      # Enable data checksums for corruption detection (new DBs only)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - substrate_prod_postgres:/var/lib/postgresql/data
      - ./packages/database/src/migrations:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    # Shared memory for PostgreSQL (matches shared_buffers)
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    # Allow clean shutdown
    stop_grace_period: 30s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:8.4-alpine@sha256:e55195a3afbb812a14306909caad6583a1ab6c79f393f53490e42cb2111084a9
    container_name: sprayberry-labs-redis
    command: sh /usr/local/etc/redis/docker-entrypoint.sh
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - substrate_prod_redis:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./infrastructure/redis/docker-entrypoint.sh:/usr/local/etc/redis/docker-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ===========================================
  # APPLICATION LAYER
  # ===========================================
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: sprayberry-labs-dashboard
    # NO PUBLIC PORTS - dashboard is only accessible via cloudflared tunnel
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # Database (via pgbouncer for connection pooling)
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      SESSION_SECRET: ${SESSION_SECRET}
      # Encryption key for API keys (shared with API)
      JWT_SECRET: ${JWT_SECRET}
      # Agent Forge proxy
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      forge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    stop_grace_period: 15s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Unified MCP Tools Server — 15 tools (workflow, data, infra, agent)
  mcp-tools:
    build:
      context: .
      dockerfile: apps/mcp-tools/Dockerfile
    container_name: sprayberry-labs-mcp-tools
    environment:
      NODE_ENV: production
      PORT: 3010
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/forge
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SEARXNG_URL: http://searxng:8080
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REPO_ROOT: /workspace
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - .:/workspace:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Agent Forge - Advanced AI Agent Creation Platform
  forge:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
    container_name: sprayberry-labs-forge
    expose:
      - "3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      # Direct connection to postgres (not via pgbouncer - separate database)
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/forge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # AI Providers — ANTHROPIC_API_KEY intentionally empty to force OAuth subscription
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ''
      ANTHROPIC_API_KEY_FALLBACK: ${ANTHROPIC_API_KEY_FALLBACK:-}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      # Substrate DB access for cross-database queries
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REPO_ROOT: /workspace
      WORKSPACE_ROOT: /workspace
      # CLI execution environment
      HOME: /tmp/claude-home
      # Git safe directory config (read-only FS, no gitconfig file)
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /workspace
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - .:/workspace
      - ./.claude-credentials.json:/tmp/claude-credentials.json:rw
    group_add:
      - "0"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Self AI - Conversation-First AI Service
  self:
    build:
      context: .
      dockerfile: apps/self/Dockerfile
    container_name: sprayberry-labs-self
    expose:
      - "3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      SELF_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/self
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3006/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    stop_grace_period: 15s
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Ask Alf — Universal Chat Service
  askalf:
    build:
      context: .
      dockerfile: apps/askalf/Dockerfile
    container_name: sprayberry-labs-askalf
    expose:
      - "3007"
    environment:
      NODE_ENV: production
      PORT: 3007
      ASKALF_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/askalf
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3007/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    stop_grace_period: 15s
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  just-push:
    build:
      context: .
      dockerfile: apps/just-push/Dockerfile
    container_name: sprayberry-labs-just-push
    expose:
      - "3008"
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      SESSION_SECRET: ${SESSION_SECRET}
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      forge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3008/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ===========================================
  # INFRASTRUCTURE LAYER
  # ===========================================
  nginx:
    image: nginx:1.28.2-alpine@sha256:15e96e59aa3b0aada3a121296e3bce117721f42d88f5f64217ef4b18f458c6ab
    container_name: sprayberry-labs-nginx
    # NO PUBLIC PORTS - nginx is only accessible via cloudflared tunnel
    # This ensures all traffic must go through Cloudflare's security layer
    expose:
      - "80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # For cloudflared: use cloudflared.conf (HTTP only, cloudflare handles SSL)
      - ./infrastructure/nginx/conf.d/cloudflared.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/static:/usr/share/nginx/static:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      dashboard:
        condition: service_healthy
      forge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
      - /var/run:mode=755,size=8m
      - /var/log/nginx:mode=755,size=50m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # Database connection pooler
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0@sha256:c7bfcaa24de830e29588bb9ad1eb39cebaf07c27149e1974445899b695634bb4
    container_name: sprayberry-labs-pgbouncer
    environment:
      # All 4 databases pooled — every service routes through pgbouncer
      DATABASE_URLS: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/substrate,postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/forge,postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/self,postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      # Authentication for PostgreSQL 17 SCRAM
      AUTH_TYPE: scram-sha-256
      STATS_USERS: substrate
      # Connection hygiene
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      # TCP keepalive for connection stability
      TCP_KEEPALIVE: 1
      TCP_KEEPIDLE: 60
      TCP_KEEPINTVL: 10
      TCP_KEEPCNT: 6
      # Reduce log noise (stats still logged)
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U substrate || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /var/run/pgbouncer:size=10M,mode=1777
      - /etc/pgbouncer:size=10M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M

  # Cloudflare Tunnel for Zero Trust access (managed via Cloudflare dashboard)
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0@sha256:404528c1cd63c3eb882c257ae524919e4376115e6fe57befca8d603656a91a4c
    container_name: sprayberry-labs-cloudflared
    # QUIC protocol preferred for better performance, metrics enabled for healthcheck
    command: tunnel --metrics localhost:2000 --protocol quic run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    # Healthcheck using cloudflared version (distroless image has no shell/curl)
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    stop_grace_period: 30s
    labels:
      - "autoheal=true"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

  # Docker socket proxy — whitelists Docker API endpoints for forge/mcp-tools
  # Replaces raw /var/run/docker.sock mounts (effectively root access) with filtered TCP proxy
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: sprayberry-labs-docker-proxy
    environment:
      # API endpoint access (GET by default, POST requires POST=1)
      CONTAINERS: 1
      EXEC: 1
      IMAGES: 1
      POST: 1
      ALLOW_RESTARTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2375/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=8m
      - /run:mode=755,size=1m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M

  # Auto-heal for container recovery
  # Only restarts containers with label "autoheal=true" that become unhealthy
  # Excluded: postgres, redis (stateful - prefer manual intervention)
  # Included: forge, dashboard, mcp-tools, nginx, pgbouncer, cloudflared, self, searxng
  autoheal:
    image: willfarrell/autoheal@sha256:63fb6c9afa4420bd118cb22ddee919f99dd2439105261c61f1a0fb506119f66b
    container_name: sprayberry-labs-autoheal
    environment:
      # Label-based scope: only restart containers with autoheal=true label
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 300
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
      # Only restart running-but-unhealthy containers, not stopped/exited ones
      AUTOHEAL_ONLY_MONITOR_RUNNING: "true"
    volumes:
      # Docker socket access required for container restart
      - /var/run/docker.sock:/var/run/docker.sock
    # No network needed - only accesses Docker socket
    network_mode: none
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
        reservations:
          cpus: '0.05'
          memory: 8M

  # ============================================
  # SEARCH — SearXNG Meta-Search Engine
  # ============================================
  searxng:
    image: searxng/searxng@sha256:670bd1076097640fc25221bf92a8af7d344503ce17ba3305abedf28e3634e807
    container_name: sprayberry-labs-searxng
    environment:
      SEARXNG_VALKEY_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./infrastructure/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./infrastructure/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ============================================
  # BACKUP — Daily PostgreSQL dumps (7-day retention)
  # ============================================
  backup:
    image: postgres:17-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
    container_name: sprayberry-labs-backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp /crontab /etc/crontabs/root
        chmod 0600 /etc/crontabs/root
        echo "[Backup] Cron scheduler started (daily 3:00 AM UTC)"
        crond -f -l 2
    environment:
      PGHOST: postgres
      PGUSER: substrate
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infrastructure/backup/backup.sh:/backup.sh:ro
      - ./infrastructure/backup/crontab:/crontab:ro
      - sprayberry_labs_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sprayberry-labs-net
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
      - /var/log:mode=755,size=8m
      - /etc/crontabs:mode=755,size=1m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

# Production volumes (isolated from dev)
volumes:
  substrate_prod_postgres:
    name: substrate_prod_postgres
    external: true
  substrate_prod_redis:
    name: substrate_prod_redis
    external: true
  nginx_cache:
    name: substrate_prod_nginx_cache
    external: true
  searxng_cache:
    name: substrate_prod_searxng_cache
    external: true
  sprayberry_labs_backups:
    name: sprayberry_labs_backups

networks:
  sprayberry-labs-net:
    name: sprayberry-labs-net
    driver: bridge

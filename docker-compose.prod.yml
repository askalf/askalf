name: substrate-prod

services:
  # ===========================================
  # DATABASE LAYER
  # ===========================================
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm
    container_name: substrate-prod-postgres
    ports:
      - "127.0.0.1:5432:5432"  # Local access for MCP
    environment:
      POSTGRES_USER: substrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: substrate
      # Enable data checksums for corruption detection (new DBs only)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - substrate_prod_postgres:/var/lib/postgresql/data
      - ./packages/database/src/migrations:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    # Shared memory for PostgreSQL (matches shared_buffers)
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    # Allow clean shutdown
    stop_grace_period: 30s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7.4-alpine
    container_name: substrate-prod-redis
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - substrate_prod_redis:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ===========================================
  # APPLICATION LAYER
  # ===========================================
  # API service RETIRED — all endpoints migrated to Forge (Phase 2)
  # Container can be stopped: docker stop substrate-prod-api && docker rm substrate-prod-api

  # Scheduler - singleton that manages job schedules (only one should run)
  scheduler:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: substrate-prod-scheduler
    environment:
      NODE_ENV: production
      WORKER_ROLE: scheduler
      WORKER_ID: scheduler-primary
      HEALTH_PORT: 8081
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Database (via pgbouncer for connection pooling)
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Configurable schedules (cron format) - defaults shown
      # SCHEDULE_CRYSTALLIZE: "*/15 * * * *"
      # SCHEDULE_PROMOTE: "*/30 * * * *"
      # SCHEDULE_DECAY: "0 */12 * * *"
      # SCHEDULE_METACOGNITION: "0 * * * *"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Healthcheck: verify scheduler has lock, DB connected, recent heartbeat
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8081/health').then(r=>{if(!r.ok)throw new Error();return r.json()}).then(d=>{if(d.status!=='healthy')throw new Error(d.status);process.exit(0)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Worker - processes jobs (can scale horizontally)
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: substrate-prod-worker
    environment:
      NODE_ENV: production
      WORKER_ROLE: worker
      WORKER_ID: worker-primary
      HEALTH_PORT: 8081
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Concurrency settings (tune based on load)
      CONCURRENCY_CRYSTALLIZE: ${CONCURRENCY_CRYSTALLIZE:-2}
      CONCURRENCY_PROMOTE: ${CONCURRENCY_PROMOTE:-2}
      CONCURRENCY_DECAY: ${CONCURRENCY_DECAY:-1}
      CONCURRENCY_TRACE: ${CONCURRENCY_TRACE:-10}
      CONCURRENCY_EXECUTE: ${CONCURRENCY_EXECUTE:-20}
      # Rate limits (configurable)
      RATE_LIMIT_CRYSTALLIZE: ${RATE_LIMIT_CRYSTALLIZE:-10}
      # Job timeouts (milliseconds)
      # TIMEOUT_CRYSTALLIZE: 300000
      # TIMEOUT_PROMOTE: 120000
      # Database (via pgbouncer for connection pooling)
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    # Healthcheck: verify worker health via HTTP endpoint
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8081/health').then(r=>{if(!r.ok)throw new Error();return r.json()}).then(d=>{if(d.status!=='healthy')throw new Error(d.status);process.exit(0)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      # Scale workers horizontally as needed:
      # docker-compose -f docker-compose.prod.yml up -d --scale worker=3
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: substrate-prod-dashboard
    # NO PUBLIC PORTS - dashboard is only accessible via cloudflared tunnel
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # Database (via pgbouncer for connection pooling)
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      SESSION_SECRET: ${SESSION_SECRET}
      # Encryption key for API keys (shared with API)
      JWT_SECRET: ${JWT_SECRET}
      # Agent Forge proxy
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      forge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # MCP (legacy) service RETIRED — replaced by unified mcp-tools (Phase 3)
  # Container can be stopped: docker stop substrate-prod-mcp && docker rm substrate-prod-mcp

  # Unified MCP Tools Server — 19 tools (workflow, data, infra, agent, alf)
  mcp-tools:
    build:
      context: .
      dockerfile: apps/mcp-tools/Dockerfile
    container_name: substrate-prod-mcp-tools
    environment:
      NODE_ENV: production
      PORT: 3010
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/forge
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@pgbouncer:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SEARXNG_URL: http://searxng:8080
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REPO_ROOT: /workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Agent Forge - Advanced AI Agent Creation Platform
  forge:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
    container_name: substrate-prod-forge
    expose:
      - "3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      # Direct connection to postgres (not via pgbouncer - separate database)
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/forge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # AI Providers — ANTHROPIC_API_KEY intentionally empty to force OAuth subscription
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ''
      ANTHROPIC_API_KEY_FALLBACK: ${ANTHROPIC_API_KEY_FALLBACK:-}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      # Substrate DB access for cross-database queries
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/substrate
      REPO_ROOT: /workspace
      WORKSPACE_ROOT: /workspace
      # CLI execution environment
      HOME: /tmp/claude-home
      # Git safe directory config (read-only FS, no gitconfig file)
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
      - ./.claude-credentials.json:/tmp/claude-credentials.json:rw
    group_add:
      - "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Self AI - Conversation-First AI Service
  self:
    build:
      context: .
      dockerfile: apps/self/Dockerfile
    container_name: substrate-prod-self
    expose:
      - "3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      SELF_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/self
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3006/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Ask Alf — Universal Chat Service
  askalf:
    build:
      context: .
      dockerfile: apps/askalf/Dockerfile
    container_name: substrate-prod-askalf
    expose:
      - "3007"
    environment:
      NODE_ENV: production
      PORT: 3007
      ASKALF_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/substrate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3007/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================
  # INFRASTRUCTURE LAYER
  # ===========================================
  nginx:
    image: nginx:1.28.1-alpine
    container_name: substrate-prod-nginx
    # NO PUBLIC PORTS - nginx is only accessible via cloudflared tunnel
    # This ensures all traffic must go through Cloudflare's security layer
    expose:
      - "80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # For cloudflared: use cloudflared.conf (HTTP only, cloudflare handles SSL)
      - ./infrastructure/nginx/conf.d/cloudflared.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/static:/usr/share/nginx/static:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - dashboard
      - forge
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
      - /var/run:mode=755,size=8m
      - /var/log/nginx:mode=755,size=50m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Database connection pooler
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: substrate-prod-pgbouncer
    environment:
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/substrate
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      # Authentication for PostgreSQL 17 SCRAM
      AUTH_TYPE: scram-sha-256
      STATS_USERS: substrate
      # Connection hygiene
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      # TCP keepalive for connection stability
      TCP_KEEPALIVE: 1
      TCP_KEEPIDLE: 60
      TCP_KEEPINTVL: 10
      TCP_KEEPCNT: 6
      # Reduce log noise (stats still logged)
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U substrate || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    read_only: true
    tmpfs:
      - /var/run/pgbouncer:size=10M,mode=1777
      - /etc/pgbouncer:size=10M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # Cloudflare Tunnel for Zero Trust access (managed via Cloudflare dashboard)
  cloudflared:
    # Pinned to version tag for stability with easy updates
    image: cloudflare/cloudflared:2026.2.0
    container_name: substrate-prod-cloudflared
    # QUIC protocol preferred for better performance, metrics enabled for healthcheck
    command: tunnel --metrics localhost:2000 --protocol quic run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    # Healthcheck using cloudflared version (distroless image has no shell/curl)
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    stop_grace_period: 30s
    labels:
      - "autoheal=true"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Auto-heal for container recovery
  # Only restarts containers with label "autoheal=true" that become unhealthy
  # Excluded: postgres, redis (stateful - prefer manual intervention)
  # Included: forge, dashboard, mcp-tools, nginx, pgbouncer, cloudflared, self, searxng
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: substrate-prod-autoheal
    environment:
      # Label-based scope: only restart containers with autoheal=true label
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 300
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
    volumes:
      # Docker socket access required for container restart
      - /var/run/docker.sock:/var/run/docker.sock
    # No network needed - only accesses Docker socket
    network_mode: none
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M

  # ============================================
  # SEARCH — SearXNG Meta-Search Engine
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: substrate-prod-searxng
    volumes:
      - ./infrastructure/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - substrate-prod-net
    restart: unless-stopped
    labels:
      - "autoheal=true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # SELF AI — REMOVED (Feb 13 2026). Service fully retired.

# Production volumes (isolated from dev)
volumes:
  substrate_prod_postgres:
    name: substrate_prod_postgres
  substrate_prod_redis:
    name: substrate_prod_redis
  nginx_cache:
    name: substrate_prod_nginx_cache
  searxng_cache:
    name: substrate_prod_searxng_cache

networks:
  substrate-prod-net:
    name: substrate-prod-net
    driver: bridge

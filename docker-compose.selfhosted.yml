# AskAlf Self-Hosted — docker compose up
# See .env.example for configuration options

name: askalf-selfhosted

services:
  # ===========================================
  # DATABASE LAYER
  # ===========================================
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm@sha256:3e8b3adfd27b5707128f60956f62a793c3c9326ea8cfaf0eab7adccb5d700b21
    container_name: askalf-postgres
    labels:
      - "autoheal-askalf=true"
    expose:
      - "5432"
    environment:
      POSTGRES_USER: substrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: askalf
      POSTGRES_INITDB_ARGS: "--data-checksums"
    shm_size: 256m
    volumes:
      - askalf_postgres:/var/lib/postgresql/data
      - ./packages/database/src/migrations:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
      - /var/run/postgresql:mode=755,size=8m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrate -d askalf"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:8.4-alpine@sha256:e55195a3afbb812a14306909caad6583a1ab6c79f393f53490e42cb2111084a9
    container_name: askalf-redis
    labels:
      - "autoheal-askalf=true"
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - askalf_redis:/data
      - ./infrastructure/redis/redis-selfhosted.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    read_only: true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 640M
        reservations:
          memory: 256M

  # ===========================================
  # APPLICATION LAYER
  # ===========================================
  forge:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
    container_name: askalf-forge
    labels:
      - "autoheal-askalf=true"
    expose:
      - "3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      SELFHOSTED: "true"
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # AI Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY:-}
      # Channel integrations
      CHANNEL_ENCRYPTION_KEY: ${CHANNEL_ENCRYPTION_KEY:-}
      BASE_URL: http://localhost:${DASHBOARD_PORT:-3001}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SELFHOSTED_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      SELFHOSTED_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      REPO_ROOT: /workspace
      WORKSPACE_ROOT: /workspace
      HOME: /tmp/claude-home
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /workspace
      MAX_CLI_CONCURRENCY: ${MAX_CLI_CONCURRENCY:-4}
      SEARXNG_URL: http://searxng:8080
      # Public demo (only for hosted askalf.org, not self-hosted)
      ENABLE_PUBLIC_DEMO: ${ENABLE_PUBLIC_DEMO:-}
      # OAuth (for Claude CLI subscription)
      ANTHROPIC_OAUTH_CLIENT_ID: ${ANTHROPIC_OAUTH_CLIENT_ID:-}
      ANTHROPIC_OAUTH_CLIENT_SECRET: ${ANTHROPIC_OAUTH_CLIENT_SECRET:-}
    volumes:
      - .:/workspace
      - claude_credentials:/tmp/claude-credentials
      - ${CLAUDE_CREDENTIALS_FILE:-${HOME}/.claude/.credentials.json}:/tmp/claude-credentials/.credentials.json:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - askalf-net
    restart: unless-stopped
    stop_grace_period: 100s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=2g
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        SELFHOSTED: "true"
    container_name: askalf-dashboard
    labels:
      - "autoheal-askalf=true"
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      SELFHOSTED: "true"
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WORKSPACE_DIR: /workspace
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - .:/workspace:rw
      - claude_credentials:/tmp/claude-credentials
      - ${CLAUDE_CREDENTIALS_FILE:-${HOME}/.claude/.credentials.json}:/tmp/claude-credentials/.credentials.json:ro
      - dashboard_claude_home:/home/substrate/.claude-session
      - dashboard_codex_home:/home/substrate/.codex-session
    depends_on:
      postgres:
        condition: service_healthy
      forge:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  mcp-tools:
    build:
      context: .
      dockerfile: apps/mcp-tools/Dockerfile
    container_name: askalf-mcp-tools
    labels:
      - "autoheal-askalf=true"
    ports:
      - "127.0.0.1:3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SEARXNG_URL: http://searxng:8080
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPO_ROOT: /workspace
    volumes:
      - .:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 96M

  # ===========================================
  # INFRASTRUCTURE
  # ===========================================
  searxng:
    image: searxng/searxng@sha256:1a143665b6445079d1cd5b6facdf599d22ac9c29698dd2e7d15eb9b5f5a854cc
    container_name: askalf-searxng
    labels:
      - "autoheal-askalf=true"
    environment:
      SEARXNG_VALKEY_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./infrastructure/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./infrastructure/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - askalf-net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ===========================================
  # GLUETUN — VPN tunnel for outbound traffic (optional)
  # Activate: docker compose --profile vpn up -d
  # All outbound API calls route through encrypted VPN tunnel.
  # ===========================================
  gluetun:
    image: qmcgaw/gluetun:v3.40.0@sha256:2b42bfa046757145a5155acece417b65b4443c8033fb88661a8e9dcf7fda5a00
    container_name: askalf-gluetun
    labels:
      - "autoheal-askalf=true"
    profiles:
      - vpn
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-protonvpn}
      VPN_TYPE: ${VPN_TYPE:-wireguard}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:-}
      OPENVPN_USER: ${OPENVPN_USER:-}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD:-}
      SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES:-Switzerland}
      # HTTP proxy for other containers to route through
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8888"
      HTTPPROXY_STEALTH: "on"
      # DNS over TLS + malware blocking
      BLOCK_MALICIOUS: "on"
      DOT: "on"
      DOT_PROVIDERS: cloudflare
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - askalf-net
    restart: unless-stopped
    tmpfs:
      - /tmp:mode=1777,size=16m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  # ===========================================
  # AUTOHEAL — auto-restart unhealthy containers
  # Monitors all containers with autoheal-askalf label.
  # If a container fails its healthcheck, Autoheal restarts it.
  # ===========================================
  autoheal:
    image: willfarrell/autoheal@sha256:eeb45dc8997520bedc6b53c65c4a605a6ded3ea2be960e6c194fb9d8e3f10d4d
    container_name: askalf-autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-askalf
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
      AUTOHEAL_ONLY_MONITOR_RUNNING: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: none
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  askalf_postgres:
  askalf_redis:
  searxng_cache:
  claude_credentials:
  dashboard_claude_home:
  dashboard_codex_home:

networks:
  askalf-net:
    driver: bridge

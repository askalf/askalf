# AskAlf Self-Hosted — docker compose up
# See .env.example for configuration options

name: askalf

services:
  # ===========================================
  # DATABASE LAYER
  # ===========================================
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm
    container_name: askalf-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: substrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: askalf
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - askalf_postgres:/var/lib/postgresql/data
      - ./packages/database/src/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrate -d askalf"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - askalf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:8.4-alpine
    container_name: askalf-dev-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - askalf_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - askalf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M

  # ===========================================
  # APPLICATION LAYER
  # ===========================================
  forge:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
    container_name: askalf-forge
    ports:
      - "${FORGE_PORT:-3005}:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      SELFHOSTED: "true"
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # AI Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY:-}
      # Channel integrations
      CHANNEL_ENCRYPTION_KEY: ${CHANNEL_ENCRYPTION_KEY:-}
      BASE_URL: http://localhost:${DASHBOARD_PORT:-3001}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SELFHOSTED_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      SELFHOSTED_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      REPO_ROOT: /workspace
      WORKSPACE_ROOT: /workspace
      HOME: /tmp/claude-home
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /workspace
      DOCKER_HOST: tcp://docker-proxy:2375
      MAX_CLI_CONCURRENCY: ${MAX_CLI_CONCURRENCY:-4}
      SEARXNG_URL: http://searxng:8080
      # OAuth (for Claude CLI subscription)
      ANTHROPIC_OAUTH_CLIENT_ID: ${ANTHROPIC_OAUTH_CLIENT_ID:-}
      ANTHROPIC_OAUTH_CLIENT_SECRET: ${ANTHROPIC_OAUTH_CLIENT_SECRET:-}
    volumes:
      - .:/workspace
      - claude_credentials:/tmp/claude-credentials
    group_add:
      - "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=512m
    deploy:
      resources:
        limits:
          memory: 2048M

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        SELFHOSTED: "true"
    container_name: askalf-dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      SELFHOSTED: "true"
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - .:/workspace:rw
    depends_on:
      postgres:
        condition: service_healthy
      forge:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=128m
    deploy:
      resources:
        limits:
          memory: 512M

  mcp-tools:
    build:
      context: .
      dockerfile: apps/mcp-tools/Dockerfile
    container_name: askalf-mcp-tools
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      FORGE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      SUBSTRATE_DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD}@postgres:5432/askalf
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SEARXNG_URL: http://searxng:8080
      FORGE_URL: http://forge:3005
      FORGE_API_KEY: ${FORGE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPO_ROOT: /workspace
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - askalf-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    deploy:
      resources:
        limits:
          memory: 384M

  # ===========================================
  # INFRASTRUCTURE
  # ===========================================
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: askalf-docker-proxy
    environment:
      CONTAINERS: 1
      EXEC: 1
      IMAGES: 1
      POST: 1
      ALLOW_RESTARTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - askalf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2375/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M

  searxng:
    image: searxng/searxng@sha256:1a143665b6445079d1cd5b6facdf599d22ac9c29698dd2e7d15eb9b5f5a854cc
    container_name: askalf-dev-searxng
    environment:
      SEARXNG_VALKEY_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./infrastructure/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./infrastructure/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - askalf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  askalf_postgres:
    name: substrate_prod_postgres
    external: true
  askalf_redis:
  searxng_cache:
  claude_credentials:

networks:
  askalf-net:
    driver: bridge

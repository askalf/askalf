name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
  workflow_dispatch:
    inputs:
      site:
        description: 'Which site to deploy (get)'
        required: false
        default: 'get'

permissions:
  contents: read
  deployments: write

jobs:
  deploy-get:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare install script
        run: |
          mkdir -p deploy-get
          cp install.sh deploy-get/install.sh
      - name: Deploy get.askalf.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy deploy-get --project-name=askalf-get --branch=main

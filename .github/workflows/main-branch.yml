name: Main Branch — Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  PNPM_VERSION: 9.15.0

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm exec vitest run --config vitest.unit.config.ts

  build-docker-images:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: dashboard
            dockerfile: ./apps/dashboard/Dockerfile
            image-name: dashboard
          - app: forge
            dockerfile: ./apps/forge/Dockerfile
            image-name: forge
          - app: admin-console
            dockerfile: ./apps/admin-console/Dockerfile
            image-name: admin-console
          - app: mcp-tools
            dockerfile: ./apps/mcp-tools/Dockerfile
            image-name: mcp-tools
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image-name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image-name }}:buildcache,mode=max

  verify-build:
    runs-on: ubuntu-latest
    needs: build-docker-images
    steps:
      - name: Verify Docker images built successfully
        run: echo "All Docker images built and pushed successfully"

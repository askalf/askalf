name: Build & Push Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  ORG: askalf

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: forge
            dockerfile: apps/forge/Dockerfile
            context: .
          - image: dashboard
            dockerfile: apps/dashboard/Dockerfile
            context: .
          - image: mcp-tools
            dockerfile: apps/mcp-tools/Dockerfile
            context: .

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.tag || 'latest' }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building ${{ matrix.image }}:$VERSION"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ORG }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.ORG }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ env.ORG }}/${{ matrix.image }}:latest
          no-cache: true
          labels: |
            org.opencontainers.image.title=AskAlf ${{ matrix.image }}
            org.opencontainers.image.description=AskAlf AI Workforce Platform - ${{ matrix.image }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/askalf/askalf
            org.opencontainers.image.url=https://askalf.org
            org.opencontainers.image.vendor=AskAlf

      - name: Update Docker Hub description
        if: matrix.image == 'forge'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: askalf/forge
          short-description: "AskAlf Forge — AI Agent Execution Engine. Self-healing, self-growing autonomous fleet."
          readme-filepath: ./README.md

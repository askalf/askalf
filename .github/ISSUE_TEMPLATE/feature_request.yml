name: Feature Request
description: Suggest a new feature for AskAlf
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Ask Alf (Chat)
        - Team (Workers)
        - Ops (Tickets/Costs)
        - Memory
        - Templates & Skills
        - Marketplace
        - Workspace (Terminals)
        - Channels & Integrations
        - Docker/Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

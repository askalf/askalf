name: Bug Report
description: Report a bug in AskAlf
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant logs or error messages.
      render: shell
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dashboard
        - Forge (API/Runtime)
        - MCP Tools
        - Agent Execution
        - Memory/Brain
        - Claude CLI Terminal
        - Codex Terminal
        - Docker/Deployment
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: "Run: git rev-parse --short HEAD"
      placeholder: "e.g. c9fcca2"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

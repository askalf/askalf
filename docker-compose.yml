version: '3.8'

name: substrate

# Development docker-compose - for local development
# Use docker-compose.prod.yml for production deployment

services:
  # ===========================================
  # DATABASE LAYER
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: substrate-postgres
    environment:
      POSTGRES_USER: substrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-substrate_dev}
      POSTGRES_DB: substrate
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/src/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrate"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrate-net

  redis:
    image: redis:alpine
    container_name: substrate-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrate-net

  # ===========================================
  # APPLICATION LAYER
  # ===========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: substrate-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD:-substrate_dev}@postgres:5432/substrate
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - substrate-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: substrate-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD:-substrate_dev}@postgres:5432/substrate
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - substrate-net
    restart: unless-stopped

  website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    container_name: substrate-website
    environment:
      NODE_ENV: development
      PORT: 8080
      API_URL: http://api:3000
    ports:
      - "8080:8080"
    networks:
      - substrate-net
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: substrate-dashboard
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://substrate:${POSTGRES_PASSWORD:-substrate_dev}@postgres:5432/substrate
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - substrate-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  substrate-net:
    driver: bridge

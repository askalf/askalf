# Webhost Stack — public-facing web hosting
# Serves: amnesia.tax, askalf.org, and any other public domains
# Completely isolated from selfhosted and prod stacks

name: webhost

services:
  # ===========================================
  # NGINX — multi-site reverse proxy
  # ===========================================
  nginx:
    image: nginx:1.28.2-alpine@sha256:15e96e59aa3b0aada3a121296e3bce117721f42d88f5f64217ef4b18f458c6ab
    container_name: webhost-nginx
    labels:
      - "autoheal-webhost=true"
    command: ["/bin/sh", "-c", "[ -L /var/log/nginx/access.log ] && rm /var/log/nginx/access.log; [ -L /var/log/nginx/error.log ] && rm /var/log/nginx/error.log; touch /var/log/nginx/access.log /var/log/nginx/error.log; nginx -g 'daemon off;'"]
    expose:
      - "80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d/webhost.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/static:/usr/share/nginx/static:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - webhost-net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
      - /var/run:mode=755,size=8m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================
  # CLOUDFLARE TUNNEL — routes public traffic
  # ===========================================
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0@sha256:404528c1cd63c3eb882c257ae524919e4376115e6fe57befca8d603656a91a4c
    container_name: webhost-cloudflared
    labels:
      - "autoheal-webhost=true"
    command: tunnel --metrics localhost:2000 --protocol quic run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "localhost:2000", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - webhost-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    deploy:
      resources:
        limits:
          memory: 192M

  # ===========================================
  # REDIS — dedicated to webhost searxng only
  # ===========================================
  redis:
    image: redis:8.4-alpine@sha256:e55195a3afbb812a14306909caad6583a1ab6c79f393f53490e42cb2111084a9
    container_name: webhost-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - webhost-net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /data:mode=755,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 96M

  # ===========================================
  # GLUETUN — VPN proxy for SearXNG outgoing requests
  # ===========================================
  gluetun:
    image: qmcgaw/gluetun:v3.40.0
    container_name: webhost-gluetun
    labels:
      - "autoheal-webhost=true"
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${PROTON_WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: ${PROTON_SERVER_COUNTRIES:-Netherlands}
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8888"
      HTTPPROXY_LOG: "on"
      HTTPPROXY_STEALTH: "on"
      BLOCK_MALICIOUS: "on"
      DOT: "on"
      DOT_PROVIDERS: cloudflare
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8888 2>&1 | grep -q '400\\|200\\|503' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - webhost-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M

  # ===========================================
  # SEARXNG — search backend for amnesia.tax
  # ===========================================
  searxng:
    image: searxng/searxng@sha256:1a143665b6445079d1cd5b6facdf599d22ac9c29698dd2e7d15eb9b5f5a854cc
    container_name: webhost-searxng
    labels:
      - "autoheal-webhost=true"
    environment:
      SEARXNG_VALKEY_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      gluetun:
        condition: service_healthy
    volumes:
      - ./infrastructure/searxng/webhost-settings.yml:/etc/searxng/settings.yml:ro
      - ./infrastructure/searxng/webhost-limiter.toml:/etc/searxng/limiter.toml:ro
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - webhost-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 384M

  # ===========================================
  # AUTOHEAL — webhost containers ONLY
  # ===========================================
  autoheal:
    image: willfarrell/autoheal@sha256:eeb45dc8997520bedc6b53c65c4a605a6ded3ea2be960e6c194fb9d8e3f10d4d
    container_name: webhost-autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-webhost
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
      AUTOHEAL_ONLY_MONITOR_RUNNING: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: none
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  nginx_cache:
  nginx_logs:
  searxng_cache:

networks:
  webhost-net:
    name: webhost-net
    driver: bridge

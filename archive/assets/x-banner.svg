<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <!-- Glow effect -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#dots)"/>

  <!-- Center glow -->
  <ellipse cx="750" cy="250" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Infinity symbol - left of center -->
  <g transform="translate(520,200)">
    <ellipse cx="-35" cy="0" rx="38" ry="45" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <ellipse cx="35" cy="0" rx="38" ry="45" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#c4b5fd"/>
  </g>

  <!-- Brand text -->
  <text x="690" y="220" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="64" font-weight="800" letter-spacing="-2" fill="#a78bfa">orcastr8r</text>

  <!-- Tagline -->
  <text x="690" y="270" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="22" font-weight="400" fill="#71717a">the control plane for autonomous agents</text>

  <!-- Feature pills across bottom -->
  <g transform="translate(750,370)" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500">
    <g transform="translate(-420,0)">
      <rect x="-60" y="-14" width="120" height="28" rx="14" fill="#1a1a1d" stroke="#27272a" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#a1a1aa">Fleet Ops</text>
    </g>
    <g transform="translate(-250,0)">
      <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#1a1a1d" stroke="#27272a" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#a1a1aa">Evolution</text>
    </g>
    <g transform="translate(-65,0)">
      <rect x="-75" y="-14" width="150" height="28" rx="14" fill="#1a1a1d" stroke="#27272a" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#a1a1aa">Budget Control</text>
    </g>
    <g transform="translate(130,0)">
      <rect x="-65" y="-14" width="130" height="28" rx="14" fill="#1a1a1d" stroke="#27272a" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#a1a1aa">Auto-Healing</text>
    </g>
    <g transform="translate(315,0)">
      <rect x="-65" y="-14" width="130" height="28" rx="14" fill="#1a1a1d" stroke="#27272a" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#a1a1aa">4-Tier Memory</text>
    </g>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1500" height="2" fill="#7c3aed" opacity="0.5"/>
</svg>

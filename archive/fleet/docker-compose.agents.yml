      <<: *agent-env
      AGENT_ID: 01KGXG4SNRAAGWE0F4Z44NXB5S
      AGENT_NAME: Sentinel
      MAX_BUDGET_USD: "0.50"
    volumes:
      - .:/workspace:ro
      - ./agent-configs/sentinel/CLAUDE.md:/app/CLAUDE.md:ro
      - ./agent-configs/sentinel/mcp.json:/app/mcp.json:ro
      - ./.claude-credentials.json:/tmp/claude-credentials.json:ro


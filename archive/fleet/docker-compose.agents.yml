# Docker Compose overlay for persistent agent containers (Phase 3)
#
# Usage:
#   # Generate per-agent configs first:
#   docker exec sprayberry-labs-backup node /workspace/scripts/generate-agent-config.js
#
#   # Start all agents:
#   docker-compose -f docker-compose.prod.yml -f docker-compose.agents.yml --env-file .env.production up -d
#
#   # Start specific agents (pilot):
#   docker-compose -f docker-compose.prod.yml -f docker-compose.agents.yml --env-file .env.production up -d agent-sentinel agent-overseer

x-agent-common: &agent-common
  build:
    context: .
    dockerfile: apps/agent-container/Dockerfile
  networks:
    - sprayberry-labs-net
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:mode=1777,size=64m
    - /home/agent:uid=1001,gid=1001,mode=0755,size=32m
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  depends_on:
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "node -e \"const{Redis}=require('ioredis');const r=new Redis(process.env.REDIS_URL);r.ping().then(()=>{r.quit();process.exit(0)}).catch(()=>process.exit(1))\""]
    interval: 60s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "3"

x-agent-resources-ops: &agent-resources-ops
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 384M
      reservations:
        cpus: '0.1'
        memory: 64M

x-agent-resources-dev: &agent-resources-dev
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 384M
      reservations:
        cpus: '0.1'
        memory: 64M

x-agent-env: &agent-env
  # OAuth credentials mounted at /home/agent/.claude/.credentials.json
  # No ANTHROPIC_API_KEY — Claude Code CLI uses subscription auth
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

services:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="alien-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0b"/>
  <!-- Alien head shape -->
  <g filter="url(#glow)">
    <!-- Head outline -->
    <ellipse cx="16" cy="15" rx="10" ry="12" fill="url(#alien-gradient)" opacity="0.9"/>
    <!-- Eyes -->
    <ellipse cx="12" cy="13" rx="3" ry="4" fill="#0a0a0b"/>
    <ellipse cx="20" cy="13" rx="3" ry="4" fill="#0a0a0b"/>
    <!-- Eye shine -->
    <ellipse cx="11" cy="12" rx="1" ry="1.5" fill="#10b981" opacity="0.8"/>
    <ellipse cx="19" cy="12" rx="1" ry="1.5" fill="#10b981" opacity="0.8"/>
  </g>
</svg>

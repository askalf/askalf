<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#0f0d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="rgba(124,58,237,0.2)"/>
    </pattern>
    <mask id="dot-mask">
      <radialGradient id="dm" cx="50%" cy="40%" r="45%">
        <stop offset="0%" stop-color="white"/>
        <stop offset="100%" stop-color="black"/>
      </radialGradient>
      <rect width="1200" height="630" fill="url(#dm)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dot-mask)"/>

  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <text x="600" y="210" text-anchor="middle" font-family="monospace" font-weight="800" font-size="64" fill="url(#accent)">forge</text>

  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="40" fill="#fafafa">The control plane for autonomous agents</text>

  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="20" fill="rgba(255,255,255,0.5)">Kubernetes-style orchestration for AI agents. Deploy, evolve, operate.</text>

  <!-- Badge -->
  <rect x="530" y="400" width="140" height="32" rx="16" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="600" y="421" text-anchor="middle" font-family="monospace" font-weight="600" font-size="12" fill="#a78bfa" letter-spacing="1">EARLY ACCESS</text>

  <!-- Bottom domain -->
  <text x="600" y="580" text-anchor="middle" font-family="monospace" font-weight="500" font-size="16" fill="rgba(255,255,255,0.25)">integration.tax</text>
</svg>

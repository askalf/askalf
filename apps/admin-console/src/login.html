<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Console — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #0a0a0a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #6366f1;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:active { background: #4338ca; }
    .error {
      margin-top: 12px;
      padding: 8px 12px;
      background: #2d1212;
      border: 1px solid #7f1d1d;
      border-radius: 4px;
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Admin Console</h1>
    <p class="subtitle">integration.tax — Super-Admin Terminal</p>
    <form id="loginForm">
      <label for="token">Admin Token</label>
      <input type="password" id="token" name="token" placeholder="Enter admin token" autocomplete="off" autofocus>
      <button type="submit">Sign In</button>
      <div class="error" id="error"></div>
    </form>
    <div class="footer">Ask ALF Admin Console</div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      const token = document.getElementById('token').value.trim();
      if (!token) return;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Authentication failed';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Connection failed';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
